<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>

<title>The Deals That Make It All Just Happen — North America</title>
<style>
  
  
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif;background:#120A48;color:#fff;min-height:100vh;}
  ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#6404DA;border-radius:3px;}
  input,textarea,select{font-family:inherit;}
  input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.3);}
  input:focus,textarea:focus,select:focus{outline:1px solid #04D3AA;outline-offset:2px;}
  @keyframes fadeSlide{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
  @keyframes spin{to{transform:rotate(360deg);}}

  #app{min-height:100vh;}
  .hidden{display:none!important;}

  /* ── Chooser ── */
  #chooser{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;position:relative;}
  #chooser::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);width:520px;height:520px;background:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCIgYXJpYS1oaWRkZW49InRydWUiPjxwYXRoIGZpbGw9IiNGRkZGRkYiIGQ9Ik0xMy44OSwzMi42NWwxMC4yNSwyMi4xYy44LDEuNzgsMywyLjY1LDQuNzMsMi42NXM0LjE4LTEuMDYsNS0yLjgxTDUxLjQyLDEyYy4yNy0uNTIsLjM5LTEuMDUsLjM5LTEuNTksMC0yLjQ5LTIuMTgtMy43Ni00Ljk1LTMuNzYtMS43OCwwLTQuMDksLjc3LTQuODYsMi4zMWwtMTMuMzEsMzQuMDEtNi43MS0xNS4zM2MtLjctMS41NC0yLjg3LTIuMzEtNC42NS0yLjMxLTIuNzYsMC01LjA5LDEuMjctNS4wOSwzLjc2LDAsLjU1LDEuNjQsMy41NiwxLjY0LDMuNTZoMFoiPjwvcGF0aD48L3N2Zz4=") center/contain no-repeat;opacity:0.05;pointer-events:none;}
  .chooser-inner{text-align:center;max-width:440px;width:100%;position:relative;z-index:1;}
  .chooser-brand{font-size:12px;font-weight:700;color:#04D3AA;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
  .chooser-title{font-family:'Inter',system-ui,sans-serif;font-size:44px;font-weight:800;line-height:1.0;letter-spacing:-0.03em;text-wrap:balance;margin-bottom:8px;}
  .chooser-sub{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:10px;letter-spacing:1px;}
  .chooser-divider{width:40px;height:2px;background:#6404DA;margin:0 auto 32px;}
  .chooser-btn{width:100%;border:none;border-radius:2px;padding:17px 24px;font-family:'Inter',system-ui,sans-serif;font-weight:800;font-size:15px;cursor:pointer;margin-bottom:12px;letter-spacing:0.3px;transition:opacity 0.2s,transform 0.12s cubic-bezier(.2,.6,.2,1);}
  .chooser-btn:active{transform:translateY(1px);}
  .btn-purple{background:#6404DA;color:#fff;}
  .btn-teal{background:#04D3AA;color:#120A48;}
  .btn-pink{background:#FA6496;color:#fff;}
  .chooser-note{margin-top:24px;font-size:12px;color:rgba(255,255,255,0.3);line-height:1.8;}

  /* ── Facilitator ── */
  #fac{display:flex;flex-direction:column;height:100vh;}
  .fac-topbar{background:#1c1262;border-bottom:1px solid rgba(255,255,255,0.12);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
  .fac-title{font-size:19px;font-weight:900;letter-spacing:-0.02em;}
  .fac-subtitle{font-size:11px;color:#04D3AA;font-weight:700;letter-spacing:1.5px;margin-top:3px;}
  .topbar-right{display:flex;gap:10px;align-items:center;}
  .brand-tag .name{font-size:12px;font-weight:700;color:#04D3AA;letter-spacing:2px;}
  .brand-tag .tagline{font-size:10px;color:rgba(255,255,255,0.4);}
  .btn-summary{background:transparent;color:#04D3AA;border:1px solid #04D3AA;border-radius:2px;padding:7px 14px;font-weight:700;font-size:12px;cursor:pointer;transition:background 0.12s,color 0.12s;}
  .btn-summary.active{background:#04D3AA;color:#120A48;}
  .fac-body{display:flex;flex:1;overflow:hidden;}

  /* Sidebar */
  .sidebar{width:215px;background:#1c1262;border-right:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;flex-shrink:0;}
  .sidebar-label{padding:12px 14px 8px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;}
  .sidebar-list{flex:1;overflow-y:auto;}
  .ae-item{padding:9px 14px;cursor:pointer;border-left:2px solid transparent;transition:background 0.12s;}
  .ae-item:hover{background:rgba(255,255,255,0.05);}
  .ae-item.active{border-left-color:#04D3AA;background:rgba(255,255,255,0.07);}
  .ae-item .ae-name{font-size:13px;font-weight:500;color:rgba(255,255,255,0.5);}
  .ae-item.active .ae-name{font-weight:700;color:#fff;}
  .ae-item .ae-meta{font-size:10px;color:rgba(255,255,255,0.25);margin-top:2px;}
  .ae-item.active .ae-meta{color:#04D3AA;}
  .sidebar-add{padding:10px 14px;border-top:1px solid rgba(255,255,255,0.1);}
  .sidebar-add-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
  .sidebar-add-row{display:flex;gap:6px;}
  .sidebar-add-input{flex:1;background:#120A48;border:1px solid rgba(255,255,255,0.15);border-radius:2px;color:#fff;font-size:12px;padding:6px 8px;outline:none;}
  .sidebar-add-btn{background:#6404DA;color:#fff;border:none;border-radius:2px;padding:6px 10px;font-size:13px;font-weight:700;cursor:pointer;}

  /* Workspace */
  .fac-main{flex:1;display:flex;overflow:hidden;}
  .workspace{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
  .workspace-empty{color:rgba(255,255,255,0.4);font-size:15px;margin-top:40px;text-align:center;}

  .ae-banner{background:#6404DA;border-radius:2px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;position:relative;overflow:hidden;}
  .ae-banner::after{content:'';position:absolute;right:-18px;bottom:-22px;width:120px;height:120px;background:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCIgYXJpYS1oaWRkZW49InRydWUiPjxwYXRoIGZpbGw9IiMwNEQzQUEiIGQ9Ik0xMy44OSwzMi42NWwxMC4yNSwyMi4xYy44LDEuNzgsMywyLjY1LDQuNzMsMi42NXM0LjE4LTEuMDYsNS0yLjgxTDUxLjQyLDEyYy4yNy0uNTIsLjM5LTEuMDUsLjM5LTEuNTksMC0yLjQ5LTIuMTgtMy43Ni00Ljk1LTMuNzYtMS43OCwwLTQuMDksLjc3LTQuODYsMi4zMWwtMTMuMzEsMzQuMDEtNi43MS0xNS4zM2MtLjctMS41NC0yLjg3LTIuMzEtNC42NS0yLjMxLTIuNzYsMC01LjA5LDEuMjctNS4wOSwzLjc2LDAsLjU1LDEuNjQsMy41NiwxLjY0LDMuNTZoMFoiPjwvcGF0aD48L3N2Zz4=") center/contain no-repeat;opacity:0.14;pointer-events:none;}
  .ae-banner-label{font-size:11px;color:#04D3AA;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
  .ae-banner-name{font-size:24px;font-weight:900;margin-top:4px;letter-spacing:-0.02em;}
  .ae-banner-meta{font-size:12px;color:rgba(255,255,255,0.6);}

  .add-deal-card{background:#1c1262;border-radius:2px;padding:14px 16px;border:1px solid rgba(255,255,255,0.1);}
  .add-deal-label{font-size:10px;font-weight:700;color:#04D3AA;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .add-deal-row{display:flex;gap:8px;flex-wrap:wrap;}
  .add-deal-input{flex:2;min-width:160px;background:#120A48;border:1px solid #6404DA;border-radius:2px;color:#fff;font-size:14px;font-weight:600;padding:9px 12px;outline:none;}
  .add-deal-arr{width:130px;background:#120A48;border:1px solid #6404DA;border-radius:2px;color:#fff;font-size:14px;padding:9px 12px;outline:none;}
  .add-deal-select{width:100px;background:#120A48;border:1px solid #6404DA;border-radius:2px;color:#fff;font-size:14px;padding:9px 10px;outline:none;}
  .add-deal-btn{background:#6404DA;color:#fff;border:none;border-radius:2px;padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:transform 0.12s cubic-bezier(.2,.6,.2,1);}
  .add-deal-btn:disabled{opacity:0.4;cursor:default;}
  .add-deal-btn:not(:disabled):active{transform:translateY(1px);}

  .deal-card{background:#1c1262;border:1px solid rgba(255,255,255,0.1);border-top:4px solid rgba(255,255,255,0.12);border-radius:2px;padding:14px 16px;animation:fadeSlide 0.25s cubic-bezier(.2,.6,.2,1);}
  .deal-card.live{border-top-color:#6404DA;}
  .deal-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .deal-header-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1;}
  .live-pill{background:#FA6496;color:#fff;font-size:10px;font-weight:700;border-radius:4px;padding:2px 8px;letter-spacing:1px;animation:pulse 1.5s infinite;white-space:nowrap;}
  .deal-name{font-weight:700;font-size:15px;}
  .deal-tags{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
  .deal-tag{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;}
  .tag-arr{background:rgba(4,211,170,0.15);color:#04D3AA;border:1px solid rgba(4,211,170,0.3);}
  .tag-close{background:rgba(100,4,218,0.2);color:#a56cf5;border:1px solid rgba(100,4,218,0.3);}
  .deal-header-right{display:flex;gap:8px;align-items:center;flex-shrink:0;}
  .deal-sub-count{font-size:12px;color:#04D3AA;white-space:nowrap;}
  .btn-spotlight{background:#6404DA;color:#fff;border:none;border-radius:2px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:transform 0.12s cubic-bezier(.2,.6,.2,1);}
  .btn-spotlight:active{transform:translateY(1px);}
  .btn-spotlight.on{background:#FA6496;}
  .btn-edit-deal{background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.2);border-radius:2px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:border-color 0.12s,color 0.12s;}
  .btn-edit-deal:hover{border-color:rgba(255,255,255,0.5);color:#fff;}
  .btn-delete-deal{background:transparent;color:#FA6496;border:1px solid rgba(250,100,150,0.3);border-radius:2px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background 0.12s;}
  .btn-delete-deal:hover{background:rgba(250,100,150,0.1);}

  /* Spotlight mode */
  .fac-spotlight-wrap{display:flex;flex:1;overflow:hidden;}
  .spotlight-main{flex:1;padding:24px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
  .spotlight-hero{background:#120A48;border:1px solid rgba(255,255,255,0.1);border-top:4px solid #6404DA;border-radius:2px;padding:28px 32px;position:relative;overflow:hidden;isolation:isolate;}
  .spotlight-hero::after{content:'';position:absolute;right:0;top:0;bottom:0;width:44%;background:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIiB2aWV3Qm94PSIwIDAgMTYwIDE2MCIgYXJpYS1oaWRkZW49InRydWUiPjxkZWZzPjxwYXR0ZXJuIGlkPSJ0IiB4PSIwIiB5PSIwIiB3aWR0aD0iODAiIGhlaWdodD0iODAiIHBhdHRlcm5Vbml0cz0idXNlclNwYWNlT25Vc2UiPjxnIGZpbGw9IiNGRkZGRkYiPjxwYXRoIHRyYW5zZm9ybT0idHJhbnNsYXRlKDEwIDEwKSBzY2FsZSgwLjM0KSIgZD0iTTEzLjg5LDMyLjY1bDEwLjI1LDIyLjFjLjgsMS43OCwzLDIuNjUsNC43MywyLjY1czQuMTgtMS4wNiw1LTIuODFMNTEuNDIsMTJjLjI3LS41MiwuMzktMS4wNSwuMzktMS41OSwwLTIuNDktMi4xOC0zLjc2LTQuOTUtMy43Ni0xLjc4LDAtNC4wOSwuNzctNC44NiwyLjMxbC0xMy4zMSwzNC4wMS02LjcxLTE1LjMzYy0uNy0xLjU0LTIuODctMi4zMS00LjY1LTIuMzEtMi43NiwwLTUuMDksMS4yNy01LjA5LDMuNzYsMCwuNTUsMS42NCwzLjU2LDEuNjQsMy41NmgwWiI+PC9wYXRoPjxwYXRoIHRyYW5zZm9ybT0idHJhbnNsYXRlKDQ4IDQ4KSBzY2FsZSgwLjM0KSByb3RhdGUoMTUgMzIgMzIpIiBkPSJNMTMuODksMzIuNjVsMTAuMjUsMjIuMWMuOCwxLjc4LDMsMi42NSw0LjczLDIuNjVzNC4xOC0xLjA2LDUtMi44MUw1MS40MiwxMmMuMjctLjUyLC4zOS0xLjA1LC4zOS0xLjU5LDAtMi40OS0yLjE4LTMuNzYtNC45NS0zLjc2LTEuNzgsMC00LjA5LC43Ny00Ljg2LDIuMzFsLTEzLjMxLDM0LjAxLTYuNzEtMTUuMzNjLS43LTEuNTQtMi44Ny0yLjMxLTQuNjUtMi4zMS0yLjc2LDAtNS4wOSwxLjI3LTUuMDksMy43NiwwLC41NSwxLjY0LDMuNTYsMS42NCwzLjU2aDBaIj48L3BhdGg+PC9nPjwvcGF0dGVybj48L2RlZnM+PHJlY3Qgd2lkdGg9IjE2MCIgaGVpZ2h0PSIxNjAiIGZpbGw9InVybCgjdCkiPjwvcmVjdD48L3N2Zz4=") left top/80px 80px repeat;opacity:0.07;pointer-events:none;z-index:-1;border-radius:0 2px 2px 0;-webkit-mask-image:linear-gradient(to right,transparent 0%,black 65%);mask-image:linear-gradient(to right,transparent 0%,black 65%);}
  .spotlight-live-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(250,100,150,0.15);border:1px solid #FA6496;border-radius:4px;padding:10px 20px;font-size:13px;font-weight:700;color:#FA6496;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:20px;animation:pulse 1.5s infinite;}
  .spotlight-ae-name{font-size:14px;color:rgba(255,255,255,0.5);font-weight:600;margin-bottom:6px;}
  .spotlight-deal-name{font-family:'Inter',system-ui,sans-serif;font-size:56px;font-weight:800;line-height:1.0;margin-bottom:20px;letter-spacing:-0.03em;text-wrap:balance;}
  .spotlight-tags{display:flex;gap:10px;flex-wrap:wrap;}
  .spotlight-tag-arr{background:rgba(4,211,170,0.15);color:#04D3AA;border:1px solid rgba(4,211,170,0.4);border-radius:4px;padding:5px 14px;font-size:13px;font-weight:700;}
  .spotlight-tag-close{background:rgba(100,4,218,0.2);color:#a56cf5;border:1px solid rgba(100,4,218,0.4);border-radius:4px;padding:5px 14px;font-size:13px;font-weight:700;}
  .spotlight-remove-btn{position:absolute;top:16px;right:16px;background:transparent;color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.2);border-radius:2px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:color 0.12s,border-color 0.12s;}
  .spotlight-remove-btn:hover{color:#fff;border-color:rgba(255,255,255,0.5);}
  .spotlight-feed-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
  .spotlight-feed{display:flex;flex-direction:column;gap:8px;}
  .spotlight-sub-item{background:#1c1262;border-radius:2px;padding:12px 16px;border-top:4px solid #6404DA;animation:fadeSlide 0.3s cubic-bezier(.2,.6,.2,1);}
  .spotlight-sub-text{font-size:15px;color:#fff;line-height:1.5;}
  .spotlight-sub-meta{font-size:11px;color:rgba(255,255,255,0.4);margin-top:5px;}
  .spotlight-waiting{color:rgba(255,255,255,0.3);font-size:14px;font-style:italic;}
  .spotlight-right{width:240px;border-left:1px solid rgba(255,255,255,0.1);padding:20px 16px;display:flex;flex-direction:column;gap:16px;flex-shrink:0;overflow-y:auto;}
  .spotlight-stats-label{font-size:10px;font-weight:700;color:#FA6496;letter-spacing:2px;text-transform:uppercase;}
  .spotlight-stat{background:#1c1262;border-radius:2px;padding:10px 12px;}
  .spotlight-stat-label{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1.5px;}
  .spotlight-stat-value{font-size:28px;font-weight:900;margin-top:2px;}
  .spotlight-other-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
  .spotlight-other-deal{background:#1c1262;border-radius:2px;padding:10px 12px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);margin-bottom:8px;transition:border-color 0.12s;}
  .spotlight-other-deal:hover{border-color:#6404DA;}
  .spotlight-other-name{font-size:13px;font-weight:600;color:#fff;}
  .spotlight-other-meta{font-size:11px;color:rgba(255,255,255,0.4);margin-top:3px;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .modal-box{background:#1c1262;border:1px solid rgba(255,255,255,0.15);border-top:4px solid #6404DA;border-radius:2px;padding:24px;width:100%;max-width:440px;animation:fadeSlide 0.2s cubic-bezier(.2,.6,.2,1);}
  .modal-title{font-size:17px;font-weight:900;margin-bottom:4px;letter-spacing:-0.02em;}
  .modal-sub{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:20px;}
  .modal-label{display:block;font-size:10px;font-weight:700;color:#04D3AA;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;}
  .modal-input{width:100%;background:#120A48;border:1px solid #6404DA;border-radius:2px;color:#fff;font-size:14px;font-weight:600;padding:9px 12px;outline:none;margin-bottom:14px;}
  .modal-select{width:100%;background:#120A48;border:1px solid #6404DA;border-radius:2px;color:#fff;font-size:14px;padding:9px 12px;outline:none;margin-bottom:20px;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;}
  .modal-btn-cancel{background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.2);border-radius:2px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;}
  .modal-btn-save{background:#6404DA;color:#fff;border:none;border-radius:2px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:transform 0.12s cubic-bezier(.2,.6,.2,1);}
  .modal-btn-save:active{transform:translateY(1px);}
  .modal-btn-delete{background:#FA6496;color:#fff;border:none;border-radius:2px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:transform 0.12s cubic-bezier(.2,.6,.2,1);}
  .modal-btn-delete:active{transform:translateY(1px);}
  .modal-warn{background:rgba(250,100,150,0.1);border:1px solid rgba(250,100,150,0.3);border-radius:2px;padding:12px 14px;color:#FA6496;font-size:13px;margin-bottom:20px;line-height:1.5;}

  .deal-subs{margin-top:10px;display:flex;flex-direction:column;gap:7px;}
  .sub-item{background:#120A48;border-radius:2px;padding:9px 12px;border-top:4px solid #6404DA;animation:fadeSlide 0.2s cubic-bezier(.2,.6,.2,1);}
  .sub-text{font-size:14px;color:#fff;line-height:1.5;}
  .sub-meta{font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;}
  .deal-waiting{font-size:12px;color:rgba(255,255,255,0.25);font-style:italic;margin-top:8px;}

  /* Stats */
  .stats-panel{width:200px;border-left:1px solid rgba(255,255,255,0.1);padding:16px 14px;display:flex;flex-direction:column;gap:14px;flex-shrink:0;overflow-y:auto;}
  .stats-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;}
  .stat-box{background:#1c1262;border-radius:2px;padding:10px 12px;}
  .stat-box-label{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1.5px;}
  .stat-box-value{font-size:32px;font-weight:900;margin-top:2px;}
  .live-stat-box{background:rgba(250,100,150,0.13);border:1px solid #FA6496;border-radius:2px;padding:10px 12px;margin-top:4px;}
  .live-stat-label{font-size:10px;font-weight:700;color:#FA6496;letter-spacing:1.5px;text-transform:uppercase;}
  .live-stat-ae{font-size:13px;font-weight:700;color:#fff;margin-top:4px;}
  .live-stat-deal{font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px;}
  .live-stat-count{font-size:22px;font-weight:900;color:#FA6496;margin-top:6px;}
  .live-stat-sublabel{font-size:10px;color:rgba(255,255,255,0.4);}

  /* Summary */
  #summary{flex:1;overflow-y:auto;padding:24px 28px;}
  .summary-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
  .summary-title{font-size:20px;font-weight:900;letter-spacing:-0.02em;}
  .summary-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:3px;}
  .summary-controls{display:flex;gap:10px;flex-wrap:wrap;}
  .summary-select{background:#1c1262;color:#fff;border:1px solid #6404DA;border-radius:2px;padding:7px 12px;font-size:13px;outline:none;}
  .btn-export{background:#04D3AA;color:#120A48;border:none;border-radius:2px;padding:7px 16px;font-weight:700;font-size:13px;cursor:pointer;transition:transform 0.12s cubic-bezier(.2,.6,.2,1);}
  .btn-export:active{transform:translateY(1px);}
  .summary-ae-block{margin-bottom:28px;}
  .summary-ae-banner{background:#6404DA;border-radius:2px;padding:12px 18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
  .summary-ae-name{font-size:18px;font-weight:900;letter-spacing:-0.02em;}
  .summary-ae-meta{font-size:12px;color:rgba(255,255,255,0.6);}
  .summary-deal{background:#1c1262;border-radius:2px;padding:12px 16px;margin-bottom:10px;}
  .summary-deal-has{border-top:4px solid #04D3AA;}
  .summary-deal-none{border-top:4px solid rgba(255,255,255,0.15);}
  .summary-deal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:6px;}
  .summary-deal-name{font-weight:700;font-size:14px;}
  .summary-deal-count{font-size:12px;color:#04D3AA;}
  .summary-deal-tags{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
  .summary-sub-item{background:#120A48;border-radius:2px;padding:8px 12px;margin-bottom:6px;}
  .summary-sub-text{font-size:13px;color:#fff;line-height:1.5;}
  .summary-sub-meta{font-size:11px;color:rgba(255,255,255,0.4);margin-top:3px;}
  .summary-empty{color:rgba(255,255,255,0.25);font-size:13px;font-style:italic;}
  .no-data{color:rgba(255,255,255,0.4);font-size:14px;font-style:italic;}

  /* ── Audience ── */
  #aud{display:flex;flex-direction:column;min-height:100vh;}
  .aud-topbar{background:#1c1262;border-bottom:1px solid rgba(255,255,255,0.12);padding:13px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
  .aud-topbar-title{font-size:13px;font-weight:900;}
  .aud-topbar-sub{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px;}
  .aud-topbar-brand{font-size:11px;font-weight:700;color:#04D3AA;letter-spacing:2px;}
  .aud-body{flex:1;padding:20px 18px;max-width:560px;margin:0 auto;width:100%;}
  .aud-spotlight{background:#6404DA;border-radius:2px;padding:16px 18px;margin-bottom:20px;animation:fadeSlide 0.3s cubic-bezier(.2,.6,.2,1);}
  .aud-spotlight-label{font-size:10px;font-weight:700;color:#FA6496;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;animation:pulse 1.5s infinite;}
  .aud-spotlight-ae{font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:2px;}
  .aud-spotlight-deal{font-size:18px;font-weight:900;letter-spacing:-0.02em;}
  .aud-spotlight-tags{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .aud-section-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .aud-ae-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
  .aud-ae-row{background:#1c1262;border-radius:2px;overflow:hidden;}
  .aud-ae-header{padding:11px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-left:2px solid transparent;transition:border-color 0.15s,background 0.12s;}
  .aud-ae-header:hover{background:rgba(255,255,255,0.05);}
  .aud-ae-header.expanded{border-left-color:#04D3AA;}
  .aud-ae-hname{font-size:14px;font-weight:700;color:#fff;}
  .aud-ae-hmeta{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;}
  .aud-ae-chevron{font-size:12px;color:rgba(255,255,255,0.4);transition:transform 0.2s;}
  .aud-ae-header.expanded .aud-ae-chevron{transform:rotate(180deg);}
  .aud-ae-deals{padding:0 14px 12px;display:flex;flex-direction:column;gap:8px;}
  .aud-deal-row{background:#120A48;border-radius:2px;padding:12px 14px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);border-top:3px solid rgba(255,255,255,0.1);transition:border-top-color 0.15s;}
  .aud-deal-row:hover{border-top-color:rgba(100,4,218,0.6);}
  .aud-deal-row.selected{border-color:#6404DA;border-top-color:#6404DA;background:#1c1262;}
  .aud-deal-name{font-size:13px;font-weight:700;color:#fff;}
  .aud-deal-tags{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;}
  .aud-deal-subcount{font-size:11px;color:#04D3AA;margin-top:4px;}
  .aud-form-wrap{background:#1c1262;border:1px solid rgba(255,255,255,0.15);border-top:4px solid #6404DA;border-radius:2px;padding:18px;margin-bottom:20px;animation:fadeSlide 0.25s cubic-bezier(.2,.6,.2,1);}
  .aud-form-dealname{font-size:15px;font-weight:800;color:#fff;margin-bottom:4px;letter-spacing:-0.01em;}
  .aud-form-aename{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:14px;}
  .form-label{display:block;font-size:10px;font-weight:700;color:#04D3AA;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;}
  .form-input{width:100%;background:#120A48;border:1px solid rgba(255,255,255,0.15);border-radius:2px;color:#fff;font-size:14px;padding:9px 12px;outline:none;margin-bottom:14px;}
  .form-textarea{width:100%;background:#120A48;border:1px solid rgba(255,255,255,0.15);border-radius:2px;color:#fff;font-size:14px;padding:11px 12px;outline:none;resize:vertical;min-height:100px;line-height:1.6;margin-bottom:14px;}
  .form-submit{width:100%;background:#6404DA;color:#fff;border:none;border-radius:2px;padding:13px;font-weight:800;font-size:15px;cursor:pointer;transition:transform 0.12s cubic-bezier(.2,.6,.2,1);}
  .form-submit:not(:disabled):active{transform:translateY(1px);}
  .form-submit:disabled{opacity:0.4;cursor:default;}
  .success-msg{background:rgba(4,211,170,0.13);border:1px solid #04D3AA;border-radius:2px;padding:12px 16px;color:#04D3AA;font-weight:700;font-size:14px;text-align:center;margin-bottom:16px;animation:fadeSlide 0.2s cubic-bezier(.2,.6,.2,1);}
  .btn-cancel{background:transparent;color:rgba(255,255,255,0.5);border:none;font-size:12px;cursor:pointer;margin-top:8px;width:100%;padding:6px;}

  /* Deal submissions feed in audience */
  .aud-feed{margin-top:16px;}
  .aud-feed-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .aud-sub-item{background:#1c1262;border-radius:2px;padding:10px 14px;margin-bottom:8px;border-top:4px solid #6404DA;animation:fadeSlide 0.2s cubic-bezier(.2,.6,.2,1);}
  .aud-sub-text{font-size:13px;color:#fff;line-height:1.5;}
  .aud-sub-meta{font-size:11px;color:rgba(255,255,255,0.4);margin-top:3px;}

  /* ── AE View ── */
  #aeview{display:flex;flex-direction:column;min-height:100vh;}
  .aeview-topbar{background:#1c1262;border-bottom:1px solid rgba(255,255,255,0.12);padding:13px 18px;display:flex;justify-content:space-between;align-items:center;}
  .aeview-topbar-title{font-size:13px;font-weight:900;}
  .aeview-topbar-sub{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px;}
  .aeview-body{flex:1;padding:20px 18px;max-width:560px;margin:0 auto;width:100%;}
  .aeview-pick-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
  .aeview-ae-btn{width:100%;background:#1c1262;border:1px solid rgba(255,255,255,0.1);border-radius:2px;color:#fff;font-size:14px;font-weight:600;padding:11px 14px;cursor:pointer;text-align:left;margin-bottom:8px;transition:border-color 0.12s;}
  .aeview-ae-btn:hover{border-color:#6404DA;}
  .aeview-ae-meta{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;}
  .aeview-back{background:transparent;color:rgba(255,255,255,0.5);border:none;font-size:13px;cursor:pointer;margin-bottom:16px;padding:0;display:flex;align-items:center;gap:6px;}
  .aeview-ae-banner{background:#FA6496;border-radius:2px;padding:16px 20px;margin-bottom:20px;}
  .aeview-ae-label{font-size:11px;color:rgba(255,255,255,0.7);font-weight:700;letter-spacing:2px;text-transform:uppercase;}
  .aeview-ae-name{font-size:24px;font-weight:900;margin-top:4px;letter-spacing:-0.02em;}
  .aeview-deal{background:#1c1262;border-radius:2px;margin-bottom:12px;overflow:hidden;border-top:4px solid #FA6496;}
  .aeview-deal-header{padding:13px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
  .aeview-deal-name{font-size:14px;font-weight:700;}
  .aeview-deal-right{display:flex;align-items:center;gap:10px;}
  .aeview-deal-count{font-size:12px;color:#04D3AA;}
  .aeview-deal-chevron{font-size:12px;color:rgba(255,255,255,0.4);transition:transform 0.2s;}
  .aeview-deal-header.open .aeview-deal-chevron{transform:rotate(180deg);}
  .aeview-deal-tags{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;}
  .aeview-deal-subs{padding:0 16px 14px;display:flex;flex-direction:column;gap:8px;}
  .aeview-sub{background:#120A48;border-radius:2px;padding:10px 12px;border-top:4px solid #FA6496;}
  .aeview-sub-text{font-size:13px;color:#fff;line-height:1.5;}
  .aeview-sub-meta{font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;}
  .aeview-no-subs{font-size:13px;color:rgba(255,255,255,0.25);font-style:italic;padding:0 16px 14px;}
  .aeview-no-deals{color:rgba(255,255,255,0.25);font-size:14px;font-style:italic;text-align:center;margin-top:30px;}

  /* Loading */
  #loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;}
  .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:#6404DA;border-radius:50%;animation:spin 0.8s linear infinite;}
  .loading-logo{width:130px;opacity:0.92;margin-bottom:4px;}
  .loading-text{font-size:13px;color:rgba(255,255,255,0.4);}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAB2ZwZHBhk9GLcAeeNIs47Lwb531yP0Ug",
  authDomain: "basware-denver-hbr-2026.firebaseapp.com",
  databaseURL: "https://basware-denver-hbr-2026-default-rtdb.firebaseio.com",
  projectId: "basware-denver-hbr-2026",
  storageBucket: "basware-denver-hbr-2026.firebasestorage.app",
  messagingSenderId: "1058060933587",
  appId: "1:1058060933587:web:442aed2c14100a7c283726"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const STATE_REF = ref(db, "hbr-session");

// AEs sorted by last name
const DEFAULT_AES = [
  "Sara Abbadi","Dean Burkus","Danette Carlucci","Dan Duggan",
  "Kyle Flaherty","Joe Hager","Taylor Hess","Nick Kidd",
  "Paul Koscielski","Dale Magoon","Ramsha Mardini","Mara Miller",
  "Jason Palangio","Charlie Rafferty","Mike Segoviano","Maggie Smeltzer",
  "Courtney Talcott","Justin Wade","Jay Wick"
];

function defaultState() {
  return {
    aes: DEFAULT_AES.map(name => ({ name, deals: [] })),
    activeAE: null,
    activeDeal: null,   // spotlighted deal id (not locked)
    spotlightAE: null,  // ae name for spotlight
  };
}

let appState = null;
let currentView = "loading";

async function saveState(s) {
  appState = s;
  // Firebase rejects null values in nested objects — strip them out before writing
  const clean = JSON.parse(JSON.stringify(s, (key, val) => val === null ? undefined : val));
  try {
    await set(STATE_REF, clean);
  } catch(err) {
    console.error("Firebase write failed:", err);
    throw err;
  }
}

// Firebase listener
onValue(STATE_REF, (snapshot) => {
  const data = snapshot.val();
  if (!data) {
    appState = defaultState();
    set(STATE_REF, appState);
  } else {
    appState = data;
    if (!Array.isArray(appState.aes)) appState.aes = DEFAULT_AES.map(n=>({name:n,deals:[]}));
    appState.aes.forEach(ae => { if (!Array.isArray(ae.deals)) ae.deals = []; });
    appState.aes.sort((a, b) => lastName(a.name).localeCompare(lastName(b.name)));
  }
  if (currentView === "loading") {
    document.getElementById("loading").classList.add("hidden");
    showChooser();
  } else {
    rerenderCurrentView();
  }
});

// ── Routing ───────────────────────────────────────────────────────────────
function showChooser() { currentView = "chooser"; renderChooser(); }
function showFacilitator() { currentView = "facilitator"; showSummary = false; renderFacilitator(); }
function showAudience() { currentView = "audience"; audSelectedAE = null; audSelectedDeal = null; audExpandedAE = null; renderAudience(); }
function showAEView() { currentView = "aeview"; aeViewSelected = null; aeViewOpenDeal = null; renderAEView(); }

function rerenderCurrentView() {
  if (currentView === "facilitator") renderFacilitator();
  if (currentView === "audience") renderAudience();
  if (currentView === "aeview") renderAEView();
}

// ── CHOOSER ───────────────────────────────────────────────────────────────
function renderChooser() {
  document.getElementById("app").innerHTML = `
  <div id="chooser">
    <div class="chooser-inner">
      <div class="chooser-brand">Basware</div>
      <div class="chooser-title">The Deals That Make It<br>All Just Happen</div>
      <div class="chooser-sub">North America · Mile High Focus · Denver HBR</div>
      <div class="chooser-divider"></div>
      <button id="btn-facilitator" class="chooser-btn btn-purple">Facilitator — Big Screen</button>
      <button id="btn-audience" class="chooser-btn btn-teal">Submit Ideas — Audience</button>
      <button id="btn-aeview" class="chooser-btn btn-pink">View My Deals — AEs</button>
      <div class="chooser-note">
        Facilitators run the big screen.<br>
        Audience: submit ideas to any deal, any time.<br>
        AEs: view all ideas submitted for your deals.
      </div>
    </div>
  </div>`;
  document.getElementById("btn-facilitator").onclick = showFacilitator;
  document.getElementById("btn-audience").onclick = showAudience;
  document.getElementById("btn-aeview").onclick = showAEView;
}

// ── FACILITATOR ───────────────────────────────────────────────────────────
let showSummary = false;

function renderFacilitator() {
  const app = document.getElementById("app");
  const wsScroll = document.getElementById("fac-workspace")?.scrollTop || 0;
  const sbScroll = document.getElementById("fac-sidebar-list")?.scrollTop || 0;
  const dealInputVal = document.getElementById("fac-deal-input")?.value || "";
  const arrInputVal = document.getElementById("fac-arr-input")?.value || "";
  const closeVal = document.getElementById("fac-close-select")?.value || "Q3";
  const addAEVal = document.getElementById("fac-add-ae-input")?.value || "";

  const activeAEObj = appState.aes.find(a => a.name === appState.activeAE);
  const spotlightAEObj = appState.spotlightAE ? appState.aes.find(a=>a.name===appState.spotlightAE) : null;
  const spotlightDeal = spotlightAEObj?.deals?.find(d=>d.id===appState.activeDeal) || null;
  const totalSubs = appState.aes.reduce((acc,ae)=>acc+(ae.deals||[]).reduce((a,d)=>a+(d.submissions||[]).length,0),0);
  const totalDeals = appState.aes.reduce((acc,ae)=>acc+(ae.deals||[]).length,0);
  const aesPresented = appState.aes.filter(ae=>(ae.deals||[]).length>0).length;

  // Unique contributors helpers
  function uniqueContribs(subs){ return new Set((subs||[]).map(s=>s.author||'Anonymous')).size; }
  const totalContribs = appState.aes.reduce((acc,ae)=>{ (ae.deals||[]).forEach(d=>{ (d.submissions||[]).forEach(s=>acc.add(s.author||'Anonymous')); }); return acc; }, new Set()).size;

  // Topbar (shared)
  const topbar = `
    <div class="fac-topbar">
      <div>
        <div class="fac-title">The Deals That Make It All Just Happen</div>
        <div class="fac-subtitle">NORTH AMERICA · MILE HIGH FOCUS · DENVER HBR</div>
      </div>
      <div class="topbar-right">
        <button id="btn-toggle-summary" class="btn-summary${showSummary?' active':''}">${showSummary?'← Back to Live':'Summary'}</button>
        <button id="btn-back-roles-fac" style="background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.2);border-radius:2px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;">← Roles</button>
        <div class="brand-tag"><div class="name">BASWARE</div><div class="tagline">Now it all just happens™</div></div>
      </div>
    </div>`;

  // ── SPOTLIGHT MODE ────────────────────────────────────────────────────
  if(spotlightDeal && !showSummary){
    const spotSubs = spotlightDeal.submissions||[];
    const spotContribs = uniqueContribs(spotSubs);
    const otherDeals = (spotlightAEObj?.deals||[]).filter(d=>d.id!==spotlightDeal.id);

    const feedHTML = spotSubs.length===0
      ? `<div class="spotlight-waiting">Waiting for ideas from the room…</div>`
      : [...spotSubs].reverse().map(s=>`
          <div class="spotlight-sub-item">
            <div class="spotlight-sub-text">${esc(s.text)}</div>
            <div class="spotlight-sub-meta">— ${esc(s.author||'Anonymous')} · ${fmt(s.ts)}</div>
          </div>`).join("");

    const otherDealsHTML = otherDeals.length===0
      ? `<div style="font-size:12px;color:rgba(255,255,255,0.25);font-style:italic;">No other deals for this AE.</div>`
      : otherDeals.map(d=>`
          <div class="spotlight-other-deal" data-dealid="${d.id}" data-aename="${enc(spotlightAEObj.name)}">
            <div class="spotlight-other-name">${esc(d.name)}</div>
            <div class="spotlight-other-meta">
              ${d.arr?`ARR: ${esc(d.arr)} · `:''}${d.closeQ||''} · ${(d.submissions||[]).length} idea${(d.submissions||[]).length!==1?'s':''}
            </div>
          </div>`).join("");

    app.innerHTML=`
    <div id="fac" style="display:flex;flex-direction:column;height:100vh;">
      ${topbar}
      <div class="fac-spotlight-wrap">
        <div class="spotlight-main">
          <div class="spotlight-hero">
            <button class="spotlight-remove-btn" id="btn-remove-spotlight">Remove Spotlight</button>
            <div class="spotlight-live-badge">● SPOTLIGHT</div>
            <div class="spotlight-ae-name">${esc(appState.spotlightAE)}</div>
            <div class="spotlight-deal-name">${esc(spotlightDeal.name)}</div>
            <div class="spotlight-tags">
              ${spotlightDeal.arr?`<span class="spotlight-tag-arr">ARR: ${esc(spotlightDeal.arr)}</span>`:''}
              ${spotlightDeal.closeQ?`<span class="spotlight-tag-close">Close: ${esc(spotlightDeal.closeQ)}</span>`:''}
            </div>
          </div>
          <div class="spotlight-feed-label">Ideas Submitted (${spotSubs.length})</div>
          <div class="spotlight-feed">${feedHTML}</div>
        </div>
        <div class="spotlight-right">
          <div class="spotlight-stats-label">● This Deal</div>
          <div class="spotlight-stat">
            <div class="spotlight-stat-label">Ideas Submitted</div>
            <div class="spotlight-stat-value" style="color:#FA6496">${spotSubs.length}</div>
          </div>
          <div class="spotlight-stat">
            <div class="spotlight-stat-label">People Contributing</div>
            <div class="spotlight-stat-value" style="color:#FA6496">${spotContribs}</div>
          </div>
          <div class="spotlight-stats-label" style="color:#04D3AA;margin-top:8px;">● Session Total</div>
          <div class="spotlight-stat">
            <div class="spotlight-stat-label">Total Ideas</div>
            <div class="spotlight-stat-value" style="color:#04D3AA">${totalSubs}</div>
          </div>
          <div class="spotlight-stat">
            <div class="spotlight-stat-label">Total Contributors</div>
            <div class="spotlight-stat-value" style="color:#04D3AA">${totalContribs}</div>
          </div>
          <div class="spotlight-other-label" style="margin-top:8px;">Other Deals — ${esc(appState.spotlightAE?.split(' ')[0]||'')}</div>
          ${otherDealsHTML}
        </div>
      </div>
    </div>`;

    // Spotlight bindings
    document.getElementById("btn-toggle-summary")?.addEventListener("click",()=>{ showSummary=!showSummary; renderFacilitator(); });
    document.getElementById("btn-back-roles-fac")?.addEventListener("click", showChooser);
    document.getElementById("btn-remove-spotlight")?.addEventListener("click",async()=>{
      await saveState({...appState,activeDeal:null,spotlightAE:null});
    });
    document.querySelectorAll(".spotlight-other-deal").forEach(el=>{
      el.addEventListener("click",async()=>{
        await saveState({...appState,activeDeal:el.dataset.dealid,spotlightAE:decodeURIComponent(el.dataset.aename)});
      });
    });
    return;
  }

  // ── NORMAL MODE ───────────────────────────────────────────────────────
  const sidebarItems = appState.aes.map(ae=>{
    const subCount=(ae.deals||[]).reduce((a,d)=>a+(d.submissions||[]).length,0);

      <div class="ae-name">${esc(ae.name)}</div>

            <div>
              <div class="deal-name">${esc(deal.name)}</div>
              <div class="deal-tags">
                ${deal.arr?`<span class="deal-tag tag-arr">ARR: ${esc(deal.arr)}</span>`:''}
                ${deal.closeQ?`<span class="deal-tag tag-close">Close: ${esc(deal.closeQ)}</span>`:''}

            </div>
          </div>
          <div class="deal-header-right">
            <span class="deal-sub-count">${subs.length} idea${subs.length!==1?'s':''}</span>
            <button class="btn-edit-deal" data-dealid="${deal.id}" data-aename="${enc(ae.name)}" title="Edit deal details">Edit</button>
            <button class="btn-delete-deal" data-dealid="${deal.id}" data-aename="${enc(ae.name)}" title="Delete deal and all feedback">Delete</button>
            <button class="btn-spotlight${isSpotlit?' on':''}" data-dealid="${deal.id}" data-aename="${enc(ae.name)}">

          </div>
        </div>

      </div>`;
    }).join("");

    workspace=`
      <div class="ae-banner">
        <div>
          <div class="ae-banner-label">Now Presenting</div>
          <div class="ae-banner-name">${esc(appState.activeAE)}</div>

        <div class="ae-banner-meta">${(ae?.deals||[]).length} deal${(ae?.deals||[]).length!==1?'s':''} added</div>
      </div>
      <div class="add-deal-card">
        <div class="add-deal-label">Add a Deal for ${esc((appState.activeAE||'').split(' ')[0])}</div>

          <select id="fac-close-select" class="add-deal-select">
            <option value="Q3">Q3</option>
            <option value="Q4">Q4</option>
          </select>
          <button id="fac-add-deal-btn" class="add-deal-btn" disabled>Add Deal</button>
        </div>
      </div>
      ${(ae?.deals||[]).length===0?`<div style="color:rgba(255,255,255,0.25);font-size:13px;font-style:italic;">No deals added yet.</div>`:''}
      ${dealCards}`;
  }

  app.innerHTML=`
  <div id="fac">
    ${topbar}
    <div class="fac-body">
      <div class="sidebar">
        <div class="sidebar-label">AEs (${appState.aes.length})</div>
        <div class="sidebar-list" id="fac-sidebar-list">${sidebarItems}</div>
        <div class="sidebar-add">
          <div class="sidebar-add-label">Add AE</div>
          <div class="sidebar-add-row">
            <input id="fac-add-ae-input" class="sidebar-add-input" placeholder="Name…"/>

          </div>
        </div>
      </div>
      <div class="fac-main">
        <div class="workspace" id="fac-workspace">${workspace}</div>
        <div class="stats-panel">
          <div class="stats-label">Session Stats</div>
          <div class="stat-box"><div class="stat-box-label">Total AEs</div><div class="stat-box-value">${appState.aes.length}</div></div>
          <div class="stat-box"><div class="stat-box-label">Deals Added</div><div class="stat-box-value">${totalDeals}</div></div>
          <div class="stat-box"><div class="stat-box-label" style="color:#04D3AA">Ideas Submitted</div><div class="stat-box-value" style="color:#04D3AA">${totalSubs}</div></div>
          <div class="stat-box"><div class="stat-box-label" style="color:#6404DA">AEs Presented</div><div class="stat-box-value" style="color:#a56cf5">${aesPresented}</div></div>
        </div>
      </div>
    </div>
  </div>`;

  // Restore scroll
  if(document.getElementById("fac-workspace")) document.getElementById("fac-workspace").scrollTop=wsScroll;
  if(document.getElementById("fac-sidebar-list")) document.getElementById("fac-sidebar-list").scrollTop=sbScroll;

  // Bind
  document.getElementById("btn-toggle-summary")?.addEventListener("click",()=>{ showSummary=!showSummary; renderFacilitator(); });

  document.querySelectorAll(".ae-item").forEach(el=>{

      await saveState({...appState, activeAE:decodeURIComponent(el.dataset.ae), activeDeal:null, spotlightAE:null});

  });

    const input=document.getElementById("fac-add-ae-input");

  document.querySelectorAll(".btn-delete-deal").forEach(btn=>{

      const dealId=btn.dataset.dealid;

  });

function showEditModal(aeName, deal){
  const overlay=document.createElement("div");
  overlay.className="modal-overlay";
  overlay.innerHTML=`
    <div class="modal-box">
      <div class="modal-title">Edit Deal</div>
      <div class="modal-sub">${esc(aeName)}</div>
      <label class="modal-label">Deal / Company Name</label>
      <input id="modal-deal-name" class="modal-input" value="${esc(deal.name)}" placeholder="Deal name…"/>
      <label class="modal-label">Estimated ARR</label>
      <input id="modal-deal-arr" class="modal-input" value="${esc(deal.arr||'')}" placeholder="e.g. $125,000"/>
      <label class="modal-label">Projected Close</label>
      <select id="modal-deal-close" class="modal-select">
        <option value="Q3"${deal.closeQ==='Q3'?' selected':''}>Q3</option>
        <option value="Q4"${deal.closeQ==='Q4'?' selected':''}>Q4</option>
      </select>
      <div class="modal-actions">
        <button class="modal-btn-cancel" id="modal-cancel">Cancel</button>
        <button class="modal-btn-save" id="modal-save">Save Changes</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById("modal-cancel").onclick=()=>overlay.remove();
  overlay.addEventListener("click",e=>{ if(e.target===overlay) overlay.remove(); });
  document.getElementById("modal-save").onclick=async()=>{
    const newName=document.getElementById("modal-deal-name").value.trim();
    const newArr=document.getElementById("modal-deal-arr").value.trim();
    const newClose=document.getElementById("modal-deal-close").value;
    if(!newName) return;
    const aes=appState.aes.map(ae=>ae.name===aeName
      ?{...ae,deals:(ae.deals||[]).map(d=>d.id===deal.id?{...d,name:newName,arr:newArr,closeQ:newClose}:d)}
      :ae);
    overlay.remove();
    await saveState({...appState,aes});
  };
}

function showDeleteModal(aeName, deal){
  const subCount=(deal.submissions||[]).length;
  const overlay=document.createElement("div");
  overlay.className="modal-overlay";
  overlay.innerHTML=`
    <div class="modal-box">
      <div class="modal-title">Delete Deal</div>
      <div class="modal-sub">${esc(aeName)}</div>
      <div class="modal-warn">
        You're about to permanently delete <strong>${esc(deal.name)}</strong>${subCount>0?` and all <strong>${subCount} idea${subCount!==1?'s':''}</strong> submitted for it`:''}.
        This cannot be undone.
      </div>
      <div class="modal-actions">
        <button class="modal-btn-cancel" id="modal-cancel">Cancel</button>
        <button class="modal-btn-delete" id="modal-confirm-delete">Yes, Delete</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById("modal-cancel").onclick=()=>overlay.remove();
  overlay.addEventListener("click",e=>{ if(e.target===overlay) overlay.remove(); });
  document.getElementById("modal-confirm-delete").onclick=async()=>{
    // Filter the deal out of the correct AE's deal list
    const aes=appState.aes.map(ae=>ae.name===aeName
      ?{...ae,deals:(ae.deals||[]).filter(d=>d.id!==deal.id)}
      :ae);
    // Clear spotlight/activeDeal only if this deal was the one spotlighted
    const dealWasSpotlit=appState.activeDeal===deal.id&&appState.spotlightAE===aeName;
    const newActive=dealWasSpotlit?null:appState.activeDeal;
    const newSpotlight=dealWasSpotlit?null:appState.spotlightAE;
    overlay.remove();
    try {
      await saveState({...appState,aes,activeDeal:newActive,spotlightAE:newSpotlight});
    } catch(err) {
      alert("Delete failed: "+err.message+"\n\nCheck your Firebase rules are published.");
    }
  };
}



// ── SUMMARY ───────────────────────────────────────────────────────────────
function buildSummary(){
  const aesWithData=appState.aes.filter(ae=>(ae.deals||[]).length>0);
  const filterOpts=aesWithData.map(ae=>`<option value="${esc(ae.name)}">${esc(ae.name)}</option>`).join("");
  const aeBlocks=aesWithData.map(ae=>{
    const dealBlocks=(ae.deals||[]).map(deal=>{
      const subs=(deal.submissions||[]);
      return `<div class="summary-deal ${subs.length>0?'summary-deal-has':'summary-deal-none'}">
        <div class="summary-deal-header">
          <div class="summary-deal-name">${esc(deal.name)}</div>
          <div class="summary-deal-count">${subs.length} idea${subs.length!==1?'s':''}</div>
        </div>
        <div class="summary-deal-tags">
          ${deal.arr?`<span class="deal-tag tag-arr">ARR: ${esc(deal.arr)}</span>`:''}
          ${deal.closeQ?`<span class="deal-tag tag-close">Close: ${esc(deal.closeQ)}</span>`:''}
        </div>
        ${subs.length===0?`<div class="summary-empty">No submissions yet.</div>`:''}
        ${subs.map(s=>`<div class="summary-sub-item">
          <div class="summary-sub-text">${esc(s.text)}</div>
          <div class="summary-sub-meta">— ${esc(s.author||'Anonymous')} · ${fmt(s.ts)}</div>
        </div>`).join("")}
      </div>`;
    }).join("");
    const totalSubs=(ae.deals||[]).reduce((a,d)=>a+(d.submissions||[]).length,0);
    return `<div class="summary-ae-block">
      <div class="summary-ae-banner">
        <div class="summary-ae-name">${esc(ae.name)}</div>
        <div class="summary-ae-meta">${(ae.deals||[]).length} deal${(ae.deals||[]).length!==1?'s':''} · ${totalSubs} idea${totalSubs!==1?'s':''}</div>
      </div>
      ${dealBlocks}
    </div>`;
  }).join("");

  return `<div id="summary" style="flex:1;overflow-y:auto;padding:24px 28px;">
    <div class="summary-header">
      <div><div class="summary-title">Session Summary</div><div class="summary-sub">All deals and submitted ideas, organized by AE</div></div>
      <div class="summary-controls">
        <select id="summary-filter" class="summary-select"><option value="all">All AEs</option>${filterOpts}</select>
        <button id="btn-export-csv" class="btn-export">Export CSV</button>
      </div>
    </div>
    ${aesWithData.length===0?`<div class="no-data">No data yet.</div>`:''}
    ${aeBlocks}
  </div>`;
}

function exportCSV(){
  const rows=[["AE","Deal","Estimated ARR","Projected Close","Submission","Author","Time"]];
  appState.aes.forEach(ae=>{
    (ae.deals||[]).forEach(deal=>{
      if((deal.submissions||[]).length===0){
        rows.push([ae.name,deal.name,deal.arr||"",deal.closeQ||"","","",""]);
      } else {
        (deal.submissions||[]).forEach(s=>{
          rows.push([ae.name,deal.name,deal.arr||"",deal.closeQ||"",`"${(s.text||'').replace(/"/g,'""')}"`,s.author||"Anonymous",fmt(s.ts)]);
        });
      }
    });
  });
  const csv=rows.map(r=>r.join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="HBR-MileHighFocus-Feedback.csv";a.click();
  URL.revokeObjectURL(url);
}

    // Show spotlight badge on form if this is the spotlighted deal

    // Name field: show input if no name set yet, otherwise show "submitting as" line
    const nameFieldHTML = audName.trim()
      ? `<div style="font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:14px;">

  const submitBtn=document.getElementById("aud-submit-btn");
  // "Change" name link — clears saved name and re-renders to show input
  document.getElementById("aud-change-name-btn")?.addEventListener("click",()=>{
    audName="";
    try{ localStorage.removeItem("hbr-aud-name"); }catch{}
    renderAudience();
  });
  if(nameInput) nameInput.addEventListener("input",()=>{
    audName=nameInput.value;
    try{ localStorage.setItem("hbr-aud-name",audName); }catch{}
  });
  if(textInput){
    textInput.value=audText;
    textInput.addEventListener("input",()=>{ audText=textInput.value; if(submitBtn) submitBtn.disabled=!textInput.value.trim(); });
    if(submitBtn) submitBtn.disabled=!textInput.value.trim();
  }
  if(textInput){
    textInput.value=audText;
    textInput.addEventListener("input",()=>{ audText=textInput.value; if(submitBtn) submitBtn.disabled=!textInput.value.trim(); });
    if(submitBtn) submitBtn.disabled=!textInput.value.trim();
  }
  document.getElementById("aud-cancel-btn")?.addEventListener("click",()=>{
    audSelectedAE=spotlightDeal?appState.spotlightAE:null;
    audSelectedDeal=spotlightDeal?appState.activeDeal:null;
    audText=""; renderAudience();
  });
  submitBtn?.addEventListener("click",async()=>{
    const txt=textInput?.value?.trim();
    if(!txt||!audSelectedAE||!audSelectedDeal)return;
    try{ localStorage.setItem("hbr-aud-name",audName); }catch{}
    const sub={id:Date.now()+Math.random()+"",text:txt,author:audName.trim(),ts:Date.now()};
    const aes=appState.aes.map(ae=>ae.name===audSelectedAE
      ?{...ae,deals:(ae.deals||[]).map(d=>d.id===audSelectedDeal?{...d,submissions:[...(d.submissions||[]),sub]}:d)}
      :ae);
    audText=""; audSubmitted=true;
    await saveState({...appState,aes});
    setTimeout(()=>{ audSubmitted=false; renderAudience(); },3500);
  });
}

// ── AE VIEW ───────────────────────────────────────────────────────────────
let aeViewSelected=null;
let aeViewOpenDeal=null;

function renderAEView(){
  const app=document.getElementById("app");
  const aesWithDeals=appState.aes.filter(ae=>(ae.deals||[]).length>0);
  const selectedAEObj=aeViewSelected?appState.aes.find(a=>a.name===aeViewSelected):null;

  let bodyHTML="";
  if(!aeViewSelected){
    const list=appState.aes.map(ae=>{
      const subCount=(ae.deals||[]).reduce((a,d)=>a+(d.submissions||[]).length,0);
      return `<button class="aeview-ae-btn" data-ae="${enc(ae.name)}">
        ${esc(ae.name)}
        <div class="aeview-ae-meta">${(ae.deals||[]).length} deal${(ae.deals||[]).length!==1?'s':''} · ${subCount} idea${subCount!==1?'s':''}</div>
      </button>`;
    }).join("");
    bodyHTML=`<div class="aeview-pick-label">Select your name</div>${list}`;
  } else {
    const ae=selectedAEObj;
    const dealBlocks=(ae?.deals||[]).map(deal=>{
      const isOpen=aeViewOpenDeal===deal.id;
      const subs=(deal.submissions||[]);
      const subsHTML=isOpen?(subs.length===0
        ?`<div class="aeview-no-subs">No ideas submitted yet — check back later.</div>`
        :subs.map(s=>`<div class="aeview-sub">
          <div class="aeview-sub-text">${esc(s.text)}</div>
          <div class="aeview-sub-meta">— ${esc(s.author||'Anonymous')} · ${fmt(s.ts)}</div>
        </div>`).join("")):'';
      return `<div class="aeview-deal">
        <div class="aeview-deal-header${isOpen?' open':''}" data-dealid="${deal.id}">
          <div>
            <div class="aeview-deal-name">${esc(deal.name)}</div>
            <div class="aeview-deal-tags">
              ${deal.arr?`<span class="deal-tag tag-arr">ARR: ${esc(deal.arr)}</span>`:''}
              ${deal.closeQ?`<span class="deal-tag tag-close">Close: ${esc(deal.closeQ)}</span>`:''}
            </div>
          </div>
          <div class="aeview-deal-right">
            <span class="aeview-deal-count">${subs.length} idea${subs.length!==1?'s':''}</span>
            <span class="aeview-deal-chevron">▼</span>
          </div>
        </div>
        ${isOpen?`<div class="aeview-deal-subs">${subsHTML}</div>`:''}
      </div>`;
    }).join("");

    bodyHTML=`
      <button class="aeview-back" id="aeview-back-btn">← Back to AE list</button>
      <div class="aeview-ae-banner">
        <div class="aeview-ae-label">Your Deals & Ideas</div>
        <div class="aeview-ae-name">${esc(ae?.name||'')}</div>
      </div>
      ${(ae?.deals||[]).length===0
        ?`<div class="aeview-no-deals">No deals added yet for you. Check back once the session starts.</div>`
        :`<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:14px;letter-spacing:1px;">Tap a deal to see submitted ideas</div>${dealBlocks}`}`;
  }

  app.innerHTML=`
  <div id="aeview">
    <div class="aeview-topbar">
      <div><div class="aeview-topbar-title">The Deals That Make It All Just Happen</div>
      <div class="aeview-topbar-sub">My Deals · Mile High Focus · Denver HBR</div></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="btn-back-roles-ae" style="background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.2);border-radius:2px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;">← Roles</button>
        <div class="aud-topbar-brand">BASWARE</div>
      </div>
    </div>
    <div class="aeview-body">${bodyHTML}</div>
  </div>`;

  document.querySelectorAll(".aeview-ae-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{ aeViewSelected=decodeURIComponent(btn.dataset.ae); aeViewOpenDeal=null; renderAEView(); });
  });
  document.getElementById("btn-back-roles-ae")?.addEventListener("click", showChooser);
  document.getElementById("aeview-back-btn")?.addEventListener("click",()=>{ aeViewSelected=null; aeViewOpenDeal=null; renderAEView(); });
  document.querySelectorAll(".aeview-deal-header").forEach(el=>{
    el.addEventListener("click",()=>{
      const id=el.dataset.dealid;
      aeViewOpenDeal=aeViewOpenDeal===id?null:id;
      renderAEView();
    });
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function enc(str){ return encodeURIComponent(str||''); }
function fmt(ts){ return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function lastName(name){ const p=name.trim().split(' '); return p[p.length-1]; }
</script>
