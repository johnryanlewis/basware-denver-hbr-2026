<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Deals That Make It All Just Happen — North America</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0D0D2B;color:#fff;min-height:100vh;}
  ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#6B00D7;border-radius:3px;}
  input,textarea,select{font-family:inherit;}
  input::placeholder,textarea::placeholder{color:#4444AA;}
  @keyframes fadeSlide{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
  @keyframes spin{to{transform:rotate(360deg);}}

  #app{min-height:100vh;}
  .hidden{display:none!important;}

  /* ── Chooser ── */
  #chooser{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  .chooser-inner{text-align:center;max-width:440px;width:100%;}
  .chooser-brand{font-size:13px;font-weight:700;color:#00C9A7;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
  .chooser-title{font-size:28px;font-weight:900;line-height:1.2;margin-bottom:6px;}
  .chooser-sub{font-size:12px;color:#8888AA;margin-bottom:10px;letter-spacing:1px;}
  .chooser-divider{width:40px;height:2px;background:#6B00D7;margin:0 auto 32px;}
  .chooser-btn{width:100%;border:none;border-radius:10px;padding:17px 24px;font-weight:800;font-size:15px;cursor:pointer;margin-bottom:12px;letter-spacing:0.5px;transition:opacity 0.2s;}
  .btn-purple{background:#6B00D7;color:#fff;}
  .btn-teal{background:#00C9A7;color:#0D0D2B;}
  .btn-pink{background:#FF4D8D;color:#fff;}
  .chooser-note{margin-top:24px;font-size:11px;color:#333366;line-height:1.8;}

  /* ── Facilitator ── */
  #fac{display:flex;flex-direction:column;height:100vh;}
  .fac-topbar{background:#1A1A4E;border-bottom:2px solid #6B00D7;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
  .fac-title{font-size:19px;font-weight:900;letter-spacing:-0.5px;}
  .fac-subtitle{font-size:11px;color:#00C9A7;font-weight:700;letter-spacing:1.5px;margin-top:3px;}
  .topbar-right{display:flex;gap:10px;align-items:center;}
  .brand-tag .name{font-size:12px;font-weight:700;color:#00C9A7;letter-spacing:2px;}
  .brand-tag .tagline{font-size:10px;color:#8888AA;}
  .btn-summary{background:transparent;color:#00C9A7;border:1px solid #00C9A7;border-radius:7px;padding:7px 14px;font-weight:700;font-size:12px;cursor:pointer;}
  .btn-summary.active{background:#00C9A7;color:#0D0D2B;}
  .fac-body{display:flex;flex:1;overflow:hidden;}

  /* Sidebar */
  .sidebar{width:215px;background:#1A1A4E;border-right:1px solid #2D2D6B;display:flex;flex-direction:column;flex-shrink:0;}
  .sidebar-label{padding:12px 14px 8px;font-size:10px;font-weight:700;color:#8888AA;letter-spacing:2px;text-transform:uppercase;}
  .sidebar-list{flex:1;overflow-y:auto;}
  .ae-item{padding:9px 14px;cursor:pointer;border-left:3px solid transparent;transition:background 0.15s;}
  .ae-item:hover{background:#1E1E5A;}
  .ae-item.active{border-left-color:#00C9A7;background:#1E1E5A;}
  .ae-item .ae-name{font-size:13px;font-weight:500;color:#8888AA;}
  .ae-item.active .ae-name{font-weight:700;color:#fff;}
  .ae-item .ae-meta{font-size:10px;color:#4444AA;margin-top:2px;}
  .ae-item.active .ae-meta{color:#00C9A7;}
  .sidebar-add{padding:10px 14px;border-top:1px solid #2D2D6B;}
  .sidebar-add-label{font-size:10px;font-weight:700;color:#8888AA;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
  .sidebar-add-row{display:flex;gap:6px;}
  .sidebar-add-input{flex:1;background:#0D0D2B;border:1px solid #2D2D6B;border-radius:6px;color:#fff;font-size:12px;padding:6px 8px;outline:none;}
  .sidebar-add-btn{background:#6B00D7;color:#fff;border:none;border-radius:6px;padding:6px 10px;font-size:13px;font-weight:700;cursor:pointer;}

  /* Workspace */
  .fac-main{flex:1;display:flex;overflow:hidden;}
  .workspace{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
  .workspace-empty{color:#8888AA;font-size:15px;margin-top:40px;text-align:center;}

  .ae-banner{background:linear-gradient(90deg,#6B00D7,#4A0099);border-radius:12px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;}
  .ae-banner-label{font-size:11px;color:#00C9A7;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
  .ae-banner-name{font-size:24px;font-weight:900;margin-top:4px;}
  .ae-banner-meta{font-size:12px;color:rgba(255,255,255,0.6);}

  .add-deal-card{background:#1A1A4E;border-radius:10px;padding:14px 16px;border:1px solid #2D2D6B;}
  .add-deal-label{font-size:10px;font-weight:700;color:#00C9A7;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .add-deal-row{display:flex;gap:8px;flex-wrap:wrap;}
  .add-deal-input{flex:2;min-width:160px;background:#0D0D2B;border:1px solid #6B00D7;border-radius:8px;color:#fff;font-size:14px;font-weight:600;padding:9px 12px;outline:none;}
  .add-deal-arr{width:130px;background:#0D0D2B;border:1px solid #6B00D7;border-radius:8px;color:#fff;font-size:14px;padding:9px 12px;outline:none;}
  .add-deal-select{width:100px;background:#0D0D2B;border:1px solid #6B00D7;border-radius:8px;color:#fff;font-size:14px;padding:9px 10px;outline:none;}
  .add-deal-btn{background:#6B00D7;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;}
  .add-deal-btn:disabled{opacity:0.4;cursor:default;}

  .deal-card{background:#1A1A4E;border:1px solid #2D2D6B;border-radius:10px;padding:14px 16px;animation:fadeSlide 0.25s ease;}
  .deal-card.live{background:#1A0040;border-color:#6B00D7;}
  .deal-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .deal-header-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1;}
  .live-pill{background:#FF4D8D;color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px;letter-spacing:1px;animation:pulse 1.5s infinite;white-space:nowrap;}
  .deal-name{font-weight:700;font-size:15px;}
  .deal-tags{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
  .deal-tag{font-size:11px;padding:2px 8px;border-radius:12px;font-weight:600;}
  .tag-arr{background:rgba(0,201,167,0.15);color:#00C9A7;border:1px solid rgba(0,201,167,0.3);}
  .tag-close{background:rgba(107,0,215,0.2);color:#8B30FF;border:1px solid rgba(107,0,215,0.3);}
  .deal-header-right{display:flex;gap:8px;align-items:center;flex-shrink:0;}
  .deal-sub-count{font-size:12px;color:#00C9A7;white-space:nowrap;}
  .btn-spotlight{background:#6B00D7;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .btn-spotlight.on{background:#FF4D8D;}
  .btn-edit-deal{background:transparent;color:#8888AA;border:1px solid #4444AA;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .btn-edit-deal:hover{border-color:#8888AA;color:#fff;}
  .btn-delete-deal{background:transparent;color:#FF4D8D;border:1px solid rgba(255,77,141,0.3);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .btn-delete-deal:hover{background:rgba(255,77,141,0.1);}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .modal-box{background:#1A1A4E;border:1px solid #6B00D7;border-radius:14px;padding:24px;width:100%;max-width:440px;animation:fadeSlide 0.2s ease;}
  .modal-title{font-size:17px;font-weight:900;margin-bottom:4px;}
  .modal-sub{font-size:13px;color:#8888AA;margin-bottom:20px;}
  .modal-label{display:block;font-size:10px;font-weight:700;color:#00C9A7;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;}
  .modal-input{width:100%;background:#0D0D2B;border:1px solid #6B00D7;border-radius:8px;color:#fff;font-size:14px;font-weight:600;padding:9px 12px;outline:none;margin-bottom:14px;}
  .modal-select{width:100%;background:#0D0D2B;border:1px solid #6B00D7;border-radius:8px;color:#fff;font-size:14px;padding:9px 12px;outline:none;margin-bottom:20px;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;}
  .modal-btn-cancel{background:transparent;color:#8888AA;border:1px solid #4444AA;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;}
  .modal-btn-save{background:#6B00D7;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;}
  .modal-btn-delete{background:#FF4D8D;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;}
  .modal-warn{background:rgba(255,77,141,0.1);border:1px solid rgba(255,77,141,0.3);border-radius:8px;padding:12px 14px;color:#FF4D8D;font-size:13px;margin-bottom:20px;line-height:1.5;}

  .deal-subs{margin-top:10px;display:flex;flex-direction:column;gap:7px;}
  .sub-item{background:#0D0D2B;border-radius:7px;padding:9px 12px;border-left:3px solid #6B00D7;animation:fadeSlide 0.2s ease;}
  .sub-text{font-size:14px;color:#fff;line-height:1.5;}
  .sub-meta{font-size:11px;color:#8888AA;margin-top:4px;}
  .deal-waiting{font-size:12px;color:#4444AA;font-style:italic;margin-top:8px;}

  /* Stats */
  .stats-panel{width:200px;border-left:1px solid #2D2D6B;padding:16px 14px;display:flex;flex-direction:column;gap:14px;flex-shrink:0;overflow-y:auto;}
  .stats-label{font-size:10px;font-weight:700;color:#8888AA;letter-spacing:2px;text-transform:uppercase;}
  .stat-box{background:#1A1A4E;border-radius:8px;padding:10px 12px;}
  .stat-box-label{font-size:10px;color:#8888AA;text-transform:uppercase;letter-spacing:1.5px;}
  .stat-box-value{font-size:26px;font-weight:900;margin-top:2px;}
  .live-stat-box{background:rgba(255,77,141,0.13);border:1px solid #FF4D8D;border-radius:8px;padding:10px 12px;margin-top:4px;}
  .live-stat-label{font-size:10px;font-weight:700;color:#FF4D8D;letter-spacing:1.5px;text-transform:uppercase;}
  .live-stat-ae{font-size:13px;font-weight:700;color:#fff;margin-top:4px;}
  .live-stat-deal{font-size:12px;color:#8888AA;margin-top:2px;}
  .live-stat-count{font-size:22px;font-weight:900;color:#FF4D8D;margin-top:6px;}
  .live-stat-sublabel{font-size:10px;color:#8888AA;}

  /* Summary */
  #summary{flex:1;overflow-y:auto;padding:24px 28px;}
  .summary-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
  .summary-title{font-size:20px;font-weight:900;}
  .summary-sub{font-size:12px;color:#8888AA;margin-top:3px;}
  .summary-controls{display:flex;gap:10px;flex-wrap:wrap;}
  .summary-select{background:#1A1A4E;color:#fff;border:1px solid #6B00D7;border-radius:7px;padding:7px 12px;font-size:13px;outline:none;}
  .btn-export{background:#00C9A7;color:#0D0D2B;border:none;border-radius:7px;padding:7px 16px;font-weight:700;font-size:13px;cursor:pointer;}
  .summary-ae-block{margin-bottom:28px;}
  .summary-ae-banner{background:linear-gradient(90deg,#6B00D7,#4A0099);border-radius:10px;padding:12px 18px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
  .summary-ae-name{font-size:18px;font-weight:900;}
  .summary-ae-meta{font-size:12px;color:rgba(255,255,255,0.6);}
  .summary-deal{background:#1A1A4E;border-radius:8px;padding:12px 16px;margin-bottom:10px;}
  .summary-deal-has{border-left:3px solid #00C9A7;}
  .summary-deal-none{border-left:3px solid #4444AA;}
  .summary-deal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:6px;}
  .summary-deal-name{font-weight:700;font-size:14px;}
  .summary-deal-count{font-size:12px;color:#00C9A7;}
  .summary-deal-tags{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
  .summary-sub-item{background:#0D0D2B;border-radius:6px;padding:8px 12px;margin-bottom:6px;}
  .summary-sub-text{font-size:13px;color:#fff;line-height:1.5;}
  .summary-sub-meta{font-size:11px;color:#8888AA;margin-top:3px;}
  .summary-empty{color:#4444AA;font-size:13px;font-style:italic;}
  .no-data{color:#8888AA;font-size:14px;font-style:italic;}

  /* ── Audience ── */
  #aud{display:flex;flex-direction:column;min-height:100vh;}
  .aud-topbar{background:#1A1A4E;border-bottom:2px solid #6B00D7;padding:13px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
  .aud-topbar-title{font-size:13px;font-weight:900;}
  .aud-topbar-sub{font-size:10px;color:#8888AA;margin-top:2px;}
  .aud-topbar-brand{font-size:11px;font-weight:700;color:#00C9A7;letter-spacing:2px;}
  .aud-body{flex:1;padding:20px 18px;max-width:560px;margin:0 auto;width:100%;}

  /* Spotlight banner */
  .aud-spotlight{background:linear-gradient(135deg,#6B00D7,#4A0099);border-radius:14px;padding:16px 18px;margin-bottom:20px;animation:fadeSlide 0.3s ease;}
  .aud-spotlight-label{font-size:10px;font-weight:700;color:#FF4D8D;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;animation:pulse 1.5s infinite;}
  .aud-spotlight-ae{font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:2px;}
  .aud-spotlight-deal{font-size:18px;font-weight:900;}
  .aud-spotlight-tags{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}

  /* AE browser */
  .aud-section-label{font-size:10px;font-weight:700;color:#8888AA;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .aud-ae-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
  .aud-ae-row{background:#1A1A4E;border-radius:10px;overflow:hidden;}
  .aud-ae-header{padding:11px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-left:3px solid transparent;transition:border-color 0.2s;}
  .aud-ae-header:hover{background:#1E1E5A;}
  .aud-ae-header.expanded{border-left-color:#00C9A7;}
  .aud-ae-hname{font-size:14px;font-weight:700;color:#fff;}
  .aud-ae-hmeta{font-size:11px;color:#8888AA;margin-top:2px;}
  .aud-ae-chevron{font-size:12px;color:#8888AA;transition:transform 0.2s;}
  .aud-ae-header.expanded .aud-ae-chevron{transform:rotate(180deg);}
  .aud-ae-deals{padding:0 14px 12px;display:flex;flex-direction:column;gap:8px;}
  .aud-deal-row{background:#0D0D2B;border-radius:8px;padding:12px 14px;cursor:pointer;border:1px solid #2D2D6B;transition:border-color 0.2s;}
  .aud-deal-row:hover{border-color:#6B00D7;}
  .aud-deal-row.selected{border-color:#6B00D7;background:#160035;}
  .aud-deal-name{font-size:13px;font-weight:700;color:#fff;}
  .aud-deal-tags{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;}
  .aud-deal-subcount{font-size:11px;color:#00C9A7;margin-top:4px;}

  /* Submission form */
  .aud-form-wrap{background:#1A1A4E;border:1px solid #6B00D7;border-radius:14px;padding:18px;margin-bottom:20px;animation:fadeSlide 0.25s ease;}
  .aud-form-dealname{font-size:15px;font-weight:800;color:#fff;margin-bottom:4px;}
  .aud-form-aename{font-size:12px;color:#8888AA;margin-bottom:14px;}
  .form-label{display:block;font-size:10px;font-weight:700;color:#00C9A7;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;}
  .form-input{width:100%;background:#0D0D2B;border:1px solid #2D2D6B;border-radius:7px;color:#fff;font-size:14px;padding:9px 12px;outline:none;margin-bottom:14px;}
  .form-textarea{width:100%;background:#0D0D2B;border:1px solid #2D2D6B;border-radius:7px;color:#fff;font-size:14px;padding:11px 12px;outline:none;resize:vertical;min-height:100px;line-height:1.6;margin-bottom:14px;}
  .form-submit{width:100%;background:#6B00D7;color:#fff;border:none;border-radius:8px;padding:13px;font-weight:800;font-size:15px;cursor:pointer;transition:background 0.2s;}
  .form-submit:disabled{background:#22224A;cursor:default;}
  .success-msg{background:rgba(0,201,167,0.13);border:1px solid #00C9A7;border-radius:8px;padding:12px 16px;color:#00C9A7;font-weight:700;font-size:14px;text-align:center;margin-bottom:16px;animation:fadeSlide 0.2s ease;}
  .btn-cancel{background:transparent;color:#8888AA;border:none;font-size:12px;cursor:pointer;margin-top:8px;width:100%;padding:6px;}

  /* Deal submissions feed in audience */
  .aud-feed{margin-top:16px;}
  .aud-feed-label{font-size:10px;font-weight:700;color:#8888AA;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .aud-sub-item{background:#1A1A4E;border-radius:8px;padding:10px 14px;margin-bottom:8px;border-left:3px solid #6B00D7;animation:fadeSlide 0.2s ease;}
  .aud-sub-text{font-size:13px;color:#fff;line-height:1.5;}
  .aud-sub-meta{font-size:11px;color:#8888AA;margin-top:3px;}

  /* ── AE View ── */
  #aeview{display:flex;flex-direction:column;min-height:100vh;}
  .aeview-topbar{background:#1A1A4E;border-bottom:2px solid #FF4D8D;padding:13px 18px;display:flex;justify-content:space-between;align-items:center;}
  .aeview-topbar-title{font-size:13px;font-weight:900;}
  .aeview-topbar-sub{font-size:10px;color:#8888AA;margin-top:2px;}
  .aeview-body{flex:1;padding:20px 18px;max-width:560px;margin:0 auto;width:100%;}
  .aeview-pick-label{font-size:11px;font-weight:700;color:#8888AA;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
  .aeview-ae-btn{width:100%;background:#1A1A4E;border:1px solid #2D2D6B;border-radius:8px;color:#fff;font-size:14px;font-weight:600;padding:11px 14px;cursor:pointer;text-align:left;margin-bottom:8px;transition:border-color 0.2s;}
  .aeview-ae-btn:hover{border-color:#6B00D7;}
  .aeview-ae-meta{font-size:11px;color:#8888AA;margin-top:2px;}
  .aeview-back{background:transparent;color:#8888AA;border:none;font-size:13px;cursor:pointer;margin-bottom:16px;padding:0;display:flex;align-items:center;gap:6px;}
  .aeview-ae-banner{background:linear-gradient(90deg,#FF4D8D,#C4006A);border-radius:12px;padding:16px 20px;margin-bottom:20px;}
  .aeview-ae-label{font-size:11px;color:rgba(255,255,255,0.7);font-weight:700;letter-spacing:2px;text-transform:uppercase;}
  .aeview-ae-name{font-size:24px;font-weight:900;margin-top:4px;}
  .aeview-deal{background:#1A1A4E;border-radius:10px;margin-bottom:12px;overflow:hidden;}
  .aeview-deal-header{padding:13px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-left:3px solid #FF4D8D;}
  .aeview-deal-name{font-size:14px;font-weight:700;}
  .aeview-deal-right{display:flex;align-items:center;gap:10px;}
  .aeview-deal-count{font-size:12px;color:#00C9A7;}
  .aeview-deal-chevron{font-size:12px;color:#8888AA;transition:transform 0.2s;}
  .aeview-deal-header.open .aeview-deal-chevron{transform:rotate(180deg);}
  .aeview-deal-tags{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;}
  .aeview-deal-subs{padding:0 16px 14px;display:flex;flex-direction:column;gap:8px;}
  .aeview-sub{background:#0D0D2B;border-radius:7px;padding:10px 12px;border-left:3px solid #FF4D8D;}
  .aeview-sub-text{font-size:13px;color:#fff;line-height:1.5;}
  .aeview-sub-meta{font-size:11px;color:#8888AA;margin-top:4px;}
  .aeview-no-subs{font-size:13px;color:#4444AA;font-style:italic;padding:0 16px 14px;}
  .aeview-no-deals{color:#4444AA;font-size:14px;font-style:italic;text-align:center;margin-top:30px;}

  /* Loading */
  #loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;}
  .spinner{width:32px;height:32px;border:3px solid #2D2D6B;border-top-color:#6B00D7;border-radius:50%;animation:spin 0.8s linear infinite;}
  .loading-brand{font-size:12px;font-weight:700;color:#00C9A7;letter-spacing:3px;}
  .loading-text{font-size:13px;color:#8888AA;}
</style>
</head>
<body>
<div id="app">
  <div id="loading">
    <div class="loading-brand">BASWARE</div>
    <div class="spinner"></div>
    <div class="loading-text">Connecting to session…</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAB2ZwZHBhk9GLcAeeNIs47Lwb531yP0Ug",
  authDomain: "basware-denver-hbr-2026.firebaseapp.com",
  databaseURL: "https://basware-denver-hbr-2026-default-rtdb.firebaseio.com",
  projectId: "basware-denver-hbr-2026",
  storageBucket: "basware-denver-hbr-2026.firebasestorage.app",
  messagingSenderId: "1058060933587",
  appId: "1:1058060933587:web:442aed2c14100a7c283726"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const STATE_REF = ref(db, "hbr-session");

// AEs sorted by last name
const DEFAULT_AES = [
  "Sara Abbadi","Dean Burkus","Danette Carlucci","Dan Duggan",
  "Kyle Flaherty","Joe Hager","Taylor Hess","Nick Kidd",
  "Paul Koscielski","Dale Magoon","Ramsha Mardini","Mara Miller",
  "Jason Palangio","Charlie Rafferty","Mike Segoviano","Maggie Smeltzer",
  "Courtney Talcott","Justin Wade","Jay Wick"
];

function defaultState() {
  return {
    aes: DEFAULT_AES.map(name => ({ name, deals: [] })),
    activeAE: null,
    activeDeal: null,   // spotlighted deal id (not locked)
    spotlightAE: null,  // ae name for spotlight
  };
}

let appState = null;
let currentView = "loading";

async function saveState(s) {
  appState = s;
  // Firebase rejects null values in nested objects — strip them out before writing
  const clean = JSON.parse(JSON.stringify(s, (key, val) => val === null ? undefined : val));
  try {
    await set(STATE_REF, clean);
  } catch(err) {
    console.error("Firebase write failed:", err);
    throw err;
  }
}

// Firebase listener
onValue(STATE_REF, (snapshot) => {
  const data = snapshot.val();
  if (!data) {
    appState = defaultState();
    set(STATE_REF, appState);
  } else {
    appState = data;
    if (!Array.isArray(appState.aes)) appState.aes = DEFAULT_AES.map(n=>({name:n,deals:[]}));
    appState.aes.forEach(ae => { if (!Array.isArray(ae.deals)) ae.deals = []; });
  }
  if (currentView === "loading") {
    document.getElementById("loading").classList.add("hidden");
    showChooser();
  } else {
    rerenderCurrentView();
  }
});

// ── Routing ───────────────────────────────────────────────────────────────
function showChooser() { currentView = "chooser"; renderChooser(); }
function showFacilitator() { currentView = "facilitator"; showSummary = false; renderFacilitator(); }
function showAudience() { currentView = "audience"; audSelectedAE = null; audSelectedDeal = null; audExpandedAE = null; renderAudience(); }
function showAEView() { currentView = "aeview"; aeViewSelected = null; aeViewOpenDeal = null; renderAEView(); }

function rerenderCurrentView() {
  if (currentView === "facilitator") renderFacilitator();
  if (currentView === "audience") renderAudience();
  if (currentView === "aeview") renderAEView();
}

// ── CHOOSER ───────────────────────────────────────────────────────────────
function renderChooser() {
  document.getElementById("app").innerHTML = `
  <div id="chooser">
    <div class="chooser-inner">
      <div class="chooser-brand">Basware</div>
      <div class="chooser-title">The Deals That Make It<br>All Just Happen</div>
      <div class="chooser-sub">North America · Mile High Focus · Denver HBR</div>
      <div class="chooser-divider"></div>
      <button id="btn-facilitator" class="chooser-btn btn-purple">🖥️ &nbsp; Facilitator / Big Screen</button>
      <button id="btn-audience" class="chooser-btn btn-teal">📱 &nbsp; Submit Ideas (Audience)</button>
      <button id="btn-aeview" class="chooser-btn btn-pink">🔍 &nbsp; View My Deals (AEs)</button>
      <div class="chooser-note">
        Facilitators run the big screen.<br>
        Audience: submit ideas to any deal, any time.<br>
        AEs: view all ideas submitted for your deals.
      </div>
    </div>
  </div>`;
  document.getElementById("btn-facilitator").onclick = showFacilitator;
  document.getElementById("btn-audience").onclick = showAudience;
  document.getElementById("btn-aeview").onclick = showAEView;
}

// ── FACILITATOR ───────────────────────────────────────────────────────────
let showSummary = false;

function renderFacilitator() {
  const app = document.getElementById("app");
  const wsScroll = document.getElementById("fac-workspace")?.scrollTop || 0;
  const sbScroll = document.getElementById("fac-sidebar-list")?.scrollTop || 0;
  const dealInputVal = document.getElementById("fac-deal-input")?.value || "";
  const arrInputVal = document.getElementById("fac-arr-input")?.value || "";
  const closeVal = document.getElementById("fac-close-select")?.value || "Q3";
  const addAEVal = document.getElementById("fac-add-ae-input")?.value || "";

  const activeAEObj = appState.aes.find(a => a.name === appState.activeAE);
  const spotlightDeal = appState.spotlightAE
    ? appState.aes.find(a=>a.name===appState.spotlightAE)?.deals?.find(d=>d.id===appState.activeDeal)
    : null;
  const totalSubs = appState.aes.reduce((acc,ae)=>acc+(ae.deals||[]).reduce((a,d)=>a+(d.submissions||[]).length,0),0);
  const totalDeals = appState.aes.reduce((acc,ae)=>acc+(ae.deals||[]).length,0);
  const aesPresented = appState.aes.filter(ae=>(ae.deals||[]).length>0).length;

  // Sidebar
  const sidebarItems = appState.aes.map(ae=>{
    const subCount=(ae.deals||[]).reduce((a,d)=>a+(d.submissions||[]).length,0);
    const isActive=ae.name===appState.activeAE;
    return `<div class="ae-item${isActive?' active':''}" data-ae="${enc(ae.name)}">
      <div class="ae-name">${esc(ae.name)}</div>
      <div class="ae-meta">${(ae.deals||[]).length} deal${(ae.deals||[]).length!==1?'s':''} · ${subCount} idea${subCount!==1?'s':''}</div>
    </div>`;
  }).join("");

  // Workspace
  let workspace="";
  if(showSummary){
    workspace=buildSummary();
  } else if(!appState.activeAE){
    workspace=`<div class="workspace-empty">← Select an AE to begin</div>`;
  } else {
    const ae=activeAEObj;
    const dealCards=(ae?.deals||[]).map(deal=>{
      const isSpotlit=appState.activeDeal===deal.id;
      const subs=(deal.submissions||[]);
      let subsHTML="";
      if(isSpotlit&&subs.length>0){
        subsHTML=`<div class="deal-subs">${[...subs].reverse().map(s=>`
          <div class="sub-item"><div class="sub-text">${esc(s.text)}</div>
          <div class="sub-meta">— ${esc(s.author||'Anonymous')} · ${fmt(s.ts)}</div></div>`).join("")}</div>`;
      }
      if(isSpotlit&&subs.length===0) subsHTML=`<div class="deal-waiting">Waiting for ideas…</div>`;
      return `<div class="deal-card${isSpotlit?' live':''}">
        <div class="deal-header">
          <div class="deal-header-left">
            ${isSpotlit?`<span class="live-pill">● SPOTLIGHT</span>`:''}
            <div>
              <div class="deal-name">${esc(deal.name)}</div>
              <div class="deal-tags">
                ${deal.arr?`<span class="deal-tag tag-arr">ARR: ${esc(deal.arr)}</span>`:''}
                ${deal.closeQ?`<span class="deal-tag tag-close">Close: ${esc(deal.closeQ)}</span>`:''}
              </div>
            </div>
          </div>
          <div class="deal-header-right">
            <span class="deal-sub-count">${subs.length} idea${subs.length!==1?'s':''}</span>
            <button class="btn-edit-deal" data-dealid="${deal.id}" data-aename="${enc(ae.name)}" title="Edit deal details">✏️ Edit</button>
            <button class="btn-delete-deal" data-dealid="${deal.id}" data-aename="${enc(ae.name)}" title="Delete deal and all feedback">🗑 Delete</button>
            <button class="btn-spotlight${isSpotlit?' on':''}" data-dealid="${deal.id}" data-aename="${enc(ae.name)}">
              ${isSpotlit?'Remove Spotlight':'Spotlight'}
            </button>
          </div>
        </div>
        ${subsHTML}
      </div>`;
    }).join("");

    workspace=`
      <div class="ae-banner">
        <div>
          <div class="ae-banner-label">Now Presenting</div>
          <div class="ae-banner-name">${esc(appState.activeAE)}</div>
        </div>
        <div class="ae-banner-meta">${(ae?.deals||[]).length} deal${(ae?.deals||[]).length!==1?'s':''} added</div>
      </div>
      <div class="add-deal-card">
        <div class="add-deal-label">Add a Deal for ${esc((appState.activeAE||'').split(' ')[0])}</div>
        <div class="add-deal-row">
          <input id="fac-deal-input" class="add-deal-input" placeholder="Deal / Company name…"/>
          <input id="fac-arr-input" class="add-deal-arr" placeholder="Est. ARR ($)"/>
          <select id="fac-close-select" class="add-deal-select">
            <option value="Q3">Q3</option>
            <option value="Q4">Q4</option>
          </select>
          <button id="fac-add-deal-btn" class="add-deal-btn" disabled>Add Deal</button>
        </div>
      </div>
      ${(ae?.deals||[]).length===0?`<div style="color:#4444AA;font-size:13px;font-style:italic;">No deals added yet.</div>`:''}
      ${dealCards}`;
  }

  // Live stat
  const liveStatHTML = spotlightDeal ? `
    <div class="live-stat-box">
      <div class="live-stat-label">● Spotlighted</div>
      <div class="live-stat-ae">${esc(appState.spotlightAE||'')}</div>
      <div class="live-stat-deal">${esc(spotlightDeal.name)}</div>
      <div class="live-stat-count">${(spotlightDeal.submissions||[]).length}</div>
      <div class="live-stat-sublabel">ideas submitted</div>
    </div>` : '';

  app.innerHTML=`
  <div id="fac">
    <div class="fac-topbar">
      <div>
        <div class="fac-title">The Deals That Make It All Just Happen</div>
        <div class="fac-subtitle">NORTH AMERICA · MILE HIGH FOCUS · DENVER HBR</div>
      </div>
      <div class="topbar-right">
        <button id="btn-toggle-summary" class="btn-summary${showSummary?' active':''}">${showSummary?'← Back to Live':'📋 Summary / Export'}</button>
        <div class="brand-tag"><div class="name">BASWARE</div><div class="tagline">Now it all just happens™</div></div>
      </div>
    </div>
    <div class="fac-body">
      <div class="sidebar">
        <div class="sidebar-label">AEs (${appState.aes.length})</div>
        <div class="sidebar-list" id="fac-sidebar-list">${sidebarItems}</div>
        <div class="sidebar-add">
          <div class="sidebar-add-label">Add AE</div>
          <div class="sidebar-add-row">
            <input id="fac-add-ae-input" class="sidebar-add-input" placeholder="Name…"/>
            <button id="fac-add-ae-btn" class="sidebar-add-btn">+</button>
          </div>
        </div>
      </div>
      <div class="fac-main">
        <div class="workspace" id="fac-workspace">${workspace}</div>
        <div class="stats-panel">
          <div class="stats-label">Session Stats</div>
          <div class="stat-box"><div class="stat-box-label">Total AEs</div><div class="stat-box-value">${appState.aes.length}</div></div>
          <div class="stat-box"><div class="stat-box-label">Deals Added</div><div class="stat-box-value">${totalDeals}</div></div>
          <div class="stat-box"><div class="stat-box-label" style="color:#00C9A7">Ideas Submitted</div><div class="stat-box-value" style="color:#00C9A7">${totalSubs}</div></div>
          <div class="stat-box"><div class="stat-box-label" style="color:#6B00D7">AEs Presented</div><div class="stat-box-value" style="color:#8B30FF">${aesPresented}</div></div>
          ${liveStatHTML}
        </div>
      </div>
    </div>
  </div>`;

  // Restore scroll
  if(document.getElementById("fac-workspace")) document.getElementById("fac-workspace").scrollTop=wsScroll;
  if(document.getElementById("fac-sidebar-list")) document.getElementById("fac-sidebar-list").scrollTop=sbScroll;

  // Bind
  document.getElementById("btn-toggle-summary")?.addEventListener("click",()=>{ showSummary=!showSummary; renderFacilitator(); });
  document.getElementById("btn-export-csv")?.addEventListener("click", exportCSV);

  document.querySelectorAll(".ae-item").forEach(el=>{
    el.addEventListener("click",async()=>{
      await saveState({...appState, activeAE:decodeURIComponent(el.dataset.ae), activeDeal:null, spotlightAE:null});
    });
  });

  const addAEInput=document.getElementById("fac-add-ae-input");
  if(addAEInput){ addAEInput.value=addAEVal; addAEInput.addEventListener("keydown",e=>{if(e.key==="Enter")doAddAE();}); }
  document.getElementById("fac-add-ae-btn")?.addEventListener("click",doAddAE);

  async function doAddAE(){
    const input=document.getElementById("fac-add-ae-input");
    const n=input?.value?.trim();
    if(!n||appState.aes.find(a=>a.name===n))return;
    const sorted=[...appState.aes,{name:n,deals:[]}].sort((a,b)=>lastName(a.name).localeCompare(lastName(b.name)));
    await saveState({...appState,aes:sorted});
  }

  const dealInput=document.getElementById("fac-deal-input");
  const arrInput=document.getElementById("fac-arr-input");
  const closeSelect=document.getElementById("fac-close-select");
  const dealBtn=document.getElementById("fac-add-deal-btn");
  if(dealInput){
    dealInput.value=dealInputVal;
    dealInput.addEventListener("input",()=>{ if(dealBtn) dealBtn.disabled=!dealInput.value.trim(); });
    dealInput.addEventListener("keydown",e=>{ if(e.key==="Enter") doAddDeal(); });
  }
  if(arrInput) arrInput.value=arrInputVal;
  if(closeSelect) closeSelect.value=closeVal;
  dealBtn?.addEventListener("click",doAddDeal);

  async function doAddDeal(){
    const n=document.getElementById("fac-deal-input")?.value?.trim();
    const arr=document.getElementById("fac-arr-input")?.value?.trim();
    const closeQ=document.getElementById("fac-close-select")?.value||"Q3";
    if(!n||!appState.activeAE)return;
    const newDeal={id:Date.now()+"",name:n,arr:arr||"",closeQ,submissions:[]};
    const aes=appState.aes.map(ae=>ae.name===appState.activeAE?{...ae,deals:[...(ae.deals||[]),newDeal]}:ae);
    await saveState({...appState,aes});
  }

  // Spotlight buttons
  document.querySelectorAll(".btn-spotlight").forEach(btn=>{
    btn.addEventListener("click",async()=>{
      const dealId=btn.dataset.dealid;
      const aeName=decodeURIComponent(btn.dataset.aename);
      if(appState.activeDeal===dealId){
        await saveState({...appState,activeDeal:null,spotlightAE:null});
      } else {
        await saveState({...appState,activeDeal:dealId,spotlightAE:aeName});
      }
    });
  });

  // Edit buttons
  document.querySelectorAll(".btn-edit-deal").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const dealId=btn.dataset.dealid;
      const aeName=decodeURIComponent(btn.dataset.aename);
      const ae=appState.aes.find(a=>a.name===aeName);
      const deal=ae?.deals?.find(d=>d.id===dealId);
      if(!deal) return;
      showEditModal(aeName, deal);
    });
  });

  // Delete buttons
  document.querySelectorAll(".btn-delete-deal").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const dealId=btn.dataset.dealid;
      const aeName=decodeURIComponent(btn.dataset.aename);
      const ae=appState.aes.find(a=>a.name===aeName);
      const deal=ae?.deals?.find(d=>d.id===dealId);
      if(!deal) return;
      showDeleteModal(aeName, deal);
    });
  });
}

function showEditModal(aeName, deal){
  const overlay=document.createElement("div");
  overlay.className="modal-overlay";
  overlay.innerHTML=`
    <div class="modal-box">
      <div class="modal-title">Edit Deal</div>
      <div class="modal-sub">${esc(aeName)}</div>
      <label class="modal-label">Deal / Company Name</label>
      <input id="modal-deal-name" class="modal-input" value="${esc(deal.name)}" placeholder="Deal name…"/>
      <label class="modal-label">Estimated ARR</label>
      <input id="modal-deal-arr" class="modal-input" value="${esc(deal.arr||'')}" placeholder="e.g. $125,000"/>
      <label class="modal-label">Projected Close</label>
      <select id="modal-deal-close" class="modal-select">
        <option value="Q3"${deal.closeQ==='Q3'?' selected':''}>Q3</option>
        <option value="Q4"${deal.closeQ==='Q4'?' selected':''}>Q4</option>
      </select>
      <div class="modal-actions">
        <button class="modal-btn-cancel" id="modal-cancel">Cancel</button>
        <button class="modal-btn-save" id="modal-save">Save Changes</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById("modal-cancel").onclick=()=>overlay.remove();
  overlay.addEventListener("click",e=>{ if(e.target===overlay) overlay.remove(); });
  document.getElementById("modal-save").onclick=async()=>{
    const newName=document.getElementById("modal-deal-name").value.trim();
    const newArr=document.getElementById("modal-deal-arr").value.trim();
    const newClose=document.getElementById("modal-deal-close").value;
    if(!newName) return;
    const aes=appState.aes.map(ae=>ae.name===aeName
      ?{...ae,deals:(ae.deals||[]).map(d=>d.id===deal.id?{...d,name:newName,arr:newArr,closeQ:newClose}:d)}
      :ae);
    overlay.remove();
    await saveState({...appState,aes});
  };
}

function showDeleteModal(aeName, deal){
  const subCount=(deal.submissions||[]).length;
  const overlay=document.createElement("div");
  overlay.className="modal-overlay";
  overlay.innerHTML=`
    <div class="modal-box">
      <div class="modal-title">Delete Deal</div>
      <div class="modal-sub">${esc(aeName)}</div>
      <div class="modal-warn">
        You're about to permanently delete <strong>${esc(deal.name)}</strong>${subCount>0?` and all <strong>${subCount} idea${subCount!==1?'s':''}</strong> submitted for it`:''}.
        This cannot be undone.
      </div>
      <div class="modal-actions">
        <button class="modal-btn-cancel" id="modal-cancel">Cancel</button>
        <button class="modal-btn-delete" id="modal-confirm-delete">Yes, Delete</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById("modal-cancel").onclick=()=>overlay.remove();
  overlay.addEventListener("click",e=>{ if(e.target===overlay) overlay.remove(); });
  document.getElementById("modal-confirm-delete").onclick=async()=>{
    // Filter the deal out of the correct AE's deal list
    const aes=appState.aes.map(ae=>ae.name===aeName
      ?{...ae,deals:(ae.deals||[]).filter(d=>d.id!==deal.id)}
      :ae);
    // Clear spotlight/activeDeal only if this deal was the one spotlighted
    const dealWasSpotlit=appState.activeDeal===deal.id&&appState.spotlightAE===aeName;
    const newActive=dealWasSpotlit?null:appState.activeDeal;
    const newSpotlight=dealWasSpotlit?null:appState.spotlightAE;
    overlay.remove();
    try {
      await saveState({...appState,aes,activeDeal:newActive,spotlightAE:newSpotlight});
    } catch(err) {
      alert("Delete failed: "+err.message+"\n\nCheck your Firebase rules are published.");
    }
  };
}



// ── SUMMARY ───────────────────────────────────────────────────────────────
function buildSummary(){
  const aesWithData=appState.aes.filter(ae=>(ae.deals||[]).length>0);
  const filterOpts=aesWithData.map(ae=>`<option value="${esc(ae.name)}">${esc(ae.name)}</option>`).join("");
  const aeBlocks=aesWithData.map(ae=>{
    const dealBlocks=(ae.deals||[]).map(deal=>{
      const subs=(deal.submissions||[]);
      return `<div class="summary-deal ${subs.length>0?'summary-deal-has':'summary-deal-none'}">
        <div class="summary-deal-header">
          <div class="summary-deal-name">${esc(deal.name)}</div>
          <div class="summary-deal-count">${subs.length} idea${subs.length!==1?'s':''}</div>
        </div>
        <div class="summary-deal-tags">
          ${deal.arr?`<span class="deal-tag tag-arr">ARR: ${esc(deal.arr)}</span>`:''}
          ${deal.closeQ?`<span class="deal-tag tag-close">Close: ${esc(deal.closeQ)}</span>`:''}
        </div>
        ${subs.length===0?`<div class="summary-empty">No submissions yet.</div>`:''}
        ${subs.map(s=>`<div class="summary-sub-item">
          <div class="summary-sub-text">${esc(s.text)}</div>
          <div class="summary-sub-meta">— ${esc(s.author||'Anonymous')} · ${fmt(s.ts)}</div>
        </div>`).join("")}
      </div>`;
    }).join("");
    const totalSubs=(ae.deals||[]).reduce((a,d)=>a+(d.submissions||[]).length,0);
    return `<div class="summary-ae-block">
      <div class="summary-ae-banner">
        <div class="summary-ae-name">${esc(ae.name)}</div>
        <div class="summary-ae-meta">${(ae.deals||[]).length} deal${(ae.deals||[]).length!==1?'s':''} · ${totalSubs} idea${totalSubs!==1?'s':''}</div>
      </div>
      ${dealBlocks}
    </div>`;
  }).join("");

  return `<div id="summary" style="flex:1;overflow-y:auto;padding:24px 28px;">
    <div class="summary-header">
      <div><div class="summary-title">Session Summary</div><div class="summary-sub">All deals and submitted ideas, organized by AE</div></div>
      <div class="summary-controls">
        <select id="summary-filter" class="summary-select"><option value="all">All AEs</option>${filterOpts}</select>
        <button id="btn-export-csv" class="btn-export">⬇ Export CSV</button>
      </div>
    </div>
    ${aesWithData.length===0?`<div class="no-data">No data yet.</div>`:''}
    ${aeBlocks}
  </div>`;
}

function exportCSV(){
  const rows=[["AE","Deal","Estimated ARR","Projected Close","Submission","Author","Time"]];
  appState.aes.forEach(ae=>{
    (ae.deals||[]).forEach(deal=>{
      if((deal.submissions||[]).length===0){
        rows.push([ae.name,deal.name,deal.arr||"",deal.closeQ||"","","",""]);
      } else {
        (deal.submissions||[]).forEach(s=>{
          rows.push([ae.name,deal.name,deal.arr||"",deal.closeQ||"",`"${(s.text||'').replace(/"/g,'""')}"`,s.author||"Anonymous",fmt(s.ts)]);
        });
      }
    });
  });
  const csv=rows.map(r=>r.join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="HBR-MileHighFocus-Feedback.csv";a.click();
  URL.revokeObjectURL(url);
}

// ── AUDIENCE ──────────────────────────────────────────────────────────────
let audName="";
let audExpandedAE=null;
let audSelectedAE=null;
let audSelectedDeal=null;
let audText="";
let audSubmitted=false;
let audLastSpotlight=null;

try{ audName=localStorage.getItem("hbr-aud-name")||""; }catch{}

function renderAudience(){
  const app=document.getElementById("app");
  const spotlightAEObj=appState.spotlightAE?appState.aes.find(a=>a.name===appState.spotlightAE):null;
  const spotlightDeal=spotlightAEObj?.deals?.find(d=>d.id===appState.activeDeal);

  // If a deal is spotlighted and the audience hasn't manually picked a different one,
  // auto-point them at the spotlight deal so the form appears immediately
  const isAutoSpotlight = spotlightDeal &&
    (audSelectedDeal===null || audSelectedDeal===appState.activeDeal);
  if(isAutoSpotlight){
    audSelectedAE=appState.spotlightAE;
    audSelectedDeal=appState.activeDeal;
    // Reset submitted state if spotlight changed
    if(audLastSpotlight!==appState.activeDeal){ audSubmitted=false; audText=""; audLastSpotlight=appState.activeDeal; }
  }

  // Build AE/deal browser (always shown below form)
  const aesWithDeals=appState.aes.filter(ae=>(ae.deals||[]).length>0);
  const browserHTML=aesWithDeals.length===0
    ?`<div style="color:#4444AA;font-size:13px;font-style:italic;margin-top:10px;">No deals added yet — check back shortly.</div>`
    :aesWithDeals.map(ae=>{
      const isExpanded=audExpandedAE===ae.name;
      const subCount=(ae.deals||[]).reduce((a,d)=>a+(d.submissions||[]).length,0);
      const dealsHTML=isExpanded?(ae.deals||[]).map(deal=>{
        const isSelected=audSelectedAE===ae.name&&audSelectedDeal===deal.id;
        const subs=(deal.submissions||[]);
        return `<div class="aud-deal-row${isSelected?' selected':''}" data-ae="${enc(ae.name)}" data-dealid="${deal.id}">
          <div class="aud-deal-name">${esc(deal.name)}</div>
          <div class="aud-deal-tags">
            ${deal.arr?`<span class="deal-tag tag-arr">ARR: ${esc(deal.arr)}</span>`:''}
            ${deal.closeQ?`<span class="deal-tag tag-close">Close: ${esc(deal.closeQ)}</span>`:''}
          </div>
          <div class="aud-deal-subcount">${subs.length} idea${subs.length!==1?'s':''} submitted</div>
        </div>`;
      }).join(""):'';
      return `<div class="aud-ae-row">
        <div class="aud-ae-header${isExpanded?' expanded':''}" data-ae="${enc(ae.name)}">
          <div><div class="aud-ae-hname">${esc(ae.name)}</div>
          <div class="aud-ae-hmeta">${(ae.deals||[]).length} deal${(ae.deals||[]).length!==1?'s':''} · ${subCount} idea${subCount!==1?'s':''}</div></div>
          <div class="aud-ae-chevron">▼</div>
        </div>
        ${isExpanded?`<div class="aud-ae-deals">${dealsHTML}</div>`:''}
      </div>`;
    }).join("");

  // Build form if deal selected (auto or manual)
  const selectedAEObj=audSelectedAE?appState.aes.find(a=>a.name===audSelectedAE):null;
  const selectedDealObj=selectedAEObj?.deals?.find(d=>d.id===audSelectedDeal);
  let formHTML="";
  if(selectedDealObj){
    const isSpotlitForm=spotlightDeal&&selectedDealObj.id===spotlightDeal.id;
    const subs=(selectedDealObj.submissions||[]);
    const feedHTML=subs.length>0?`
      <div class="aud-feed">
        <div class="aud-feed-label">${subs.length} idea${subs.length!==1?'s':''} submitted</div>
        ${[...subs].reverse().map(s=>`<div class="aud-sub-item">
          <div class="aud-sub-text">${esc(s.text)}</div>
          <div class="aud-sub-meta">${esc(s.author||'Anonymous')} · ${fmt(s.ts)}</div>
        </div>`).join("")}
      </div>`:'';
    // Show spotlight badge on form if this is the spotlighted deal
    const spotBadge=isSpotlitForm?`<div style="font-size:10px;font-weight:700;color:#FF4D8D;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;animation:pulse 1.5s infinite;">● ON SCREEN NOW</div>`:'';
    // Name field: show input if no name set yet, otherwise show "submitting as" line
    const nameFieldHTML = audName.trim()
      ? `<div style="font-size:12px;color:#8888AA;margin-bottom:14px;">
           Submitting as <strong style="color:#00C9A7">${esc(audName.trim())}</strong>
           &nbsp;·&nbsp;
           <button id="aud-change-name-btn" style="background:none;border:none;color:#6B00D7;font-size:12px;cursor:pointer;padding:0;font-weight:600;">Change</button>
         </div>`
      : `<div>
           <label class="form-label">Your name (optional)</label>
           <input id="aud-name-input" class="form-input" placeholder="e.g. Sarah K." value="${esc(audName)}"/>
         </div>`;

    formHTML=`<div class="aud-form-wrap">
      ${spotBadge}
      ${audSubmitted?`<div class="success-msg">✓ Submitted! Add another if you have more.</div>`:''}
      <div class="aud-form-dealname">${esc(selectedDealObj.name)}</div>
      <div class="aud-form-aename">${esc(audSelectedAE)}</div>
      ${nameFieldHTML}
      <label class="form-label">Your idea, connection, or thought</label>
      <textarea id="aud-text-input" class="form-textarea" placeholder="Share a contact, resource, insight, or idea that could help move this deal…"></textarea>
      <button id="aud-submit-btn" class="form-submit" disabled>Send to the Screen →</button>
      ${!isSpotlitForm?`<button id="aud-cancel-btn" class="btn-cancel">← Back to deals</button>`:''}
    </div>${feedHTML}`;
  }

  app.innerHTML=`
  <div id="aud">
    <div class="aud-topbar">
      <div><div class="aud-topbar-title">The Deals That Make It All Just Happen</div>
      <div class="aud-topbar-sub">Mile High Focus · Denver HBR</div></div>
      <div class="aud-topbar-brand">BASWARE</div>
    </div>
    <div class="aud-body">
      ${formHTML}
      <div style="margin-top:${formHTML?'24px':'0'}">
        <div class="aud-section-label">${formHTML?'Or submit to another deal:':'All Deals — Tap to submit an idea'}</div>
        <div class="aud-ae-grid">${browserHTML}</div>
      </div>
    </div>
  </div>`;

  // Bind AE expand/collapse
  document.querySelectorAll(".aud-ae-header").forEach(el=>{
    el.addEventListener("click",()=>{
      const name=decodeURIComponent(el.dataset.ae);
      audExpandedAE=audExpandedAE===name?null:name;
      renderAudience();
    });
  });

  // Bind deal select — manual pick overrides spotlight auto-select
  document.querySelectorAll(".aud-deal-row").forEach(el=>{
    el.addEventListener("click",()=>{
      audSelectedAE=decodeURIComponent(el.dataset.ae);
      audSelectedDeal=el.dataset.dealid;
      audSubmitted=false; audText="";
      renderAudience();
    });
  });

  // Form bindings
  const nameInput=document.getElementById("aud-name-input");
  const textInput=document.getElementById("aud-text-input");
  const submitBtn=document.getElementById("aud-submit-btn");
  // "Change" name link — clears saved name and re-renders to show input
  document.getElementById("aud-change-name-btn")?.addEventListener("click",()=>{
    audName="";
    try{ localStorage.removeItem("hbr-aud-name"); }catch{}
    renderAudience();
  });
  if(nameInput) nameInput.addEventListener("input",()=>{
    audName=nameInput.value;
    try{ localStorage.setItem("hbr-aud-name",audName); }catch{}
  });
  if(textInput){
    textInput.value=audText;
    textInput.addEventListener("input",()=>{ audText=textInput.value; if(submitBtn) submitBtn.disabled=!textInput.value.trim(); });
    if(submitBtn) submitBtn.disabled=!textInput.value.trim();
  }
  if(textInput){
    textInput.value=audText;
    textInput.addEventListener("input",()=>{ audText=textInput.value; if(submitBtn) submitBtn.disabled=!textInput.value.trim(); });
    if(submitBtn) submitBtn.disabled=!textInput.value.trim();
  }
  document.getElementById("aud-cancel-btn")?.addEventListener("click",()=>{
    audSelectedAE=spotlightDeal?appState.spotlightAE:null;
    audSelectedDeal=spotlightDeal?appState.activeDeal:null;
    audText=""; renderAudience();
  });
  submitBtn?.addEventListener("click",async()=>{
    const txt=textInput?.value?.trim();
    if(!txt||!audSelectedAE||!audSelectedDeal)return;
    try{ localStorage.setItem("hbr-aud-name",audName); }catch{}
    const sub={id:Date.now()+Math.random()+"",text:txt,author:audName.trim(),ts:Date.now()};
    const aes=appState.aes.map(ae=>ae.name===audSelectedAE
      ?{...ae,deals:(ae.deals||[]).map(d=>d.id===audSelectedDeal?{...d,submissions:[...(d.submissions||[]),sub]}:d)}
      :ae);
    audText=""; audSubmitted=true;
    await saveState({...appState,aes});
    setTimeout(()=>{ audSubmitted=false; renderAudience(); },3500);
  });
}

// ── AE VIEW ───────────────────────────────────────────────────────────────
let aeViewSelected=null;
let aeViewOpenDeal=null;

function renderAEView(){
  const app=document.getElementById("app");
  const aesWithDeals=appState.aes.filter(ae=>(ae.deals||[]).length>0);
  const selectedAEObj=aeViewSelected?appState.aes.find(a=>a.name===aeViewSelected):null;

  let bodyHTML="";
  if(!aeViewSelected){
    const list=appState.aes.map(ae=>{
      const subCount=(ae.deals||[]).reduce((a,d)=>a+(d.submissions||[]).length,0);
      return `<button class="aeview-ae-btn" data-ae="${enc(ae.name)}">
        ${esc(ae.name)}
        <div class="aeview-ae-meta">${(ae.deals||[]).length} deal${(ae.deals||[]).length!==1?'s':''} · ${subCount} idea${subCount!==1?'s':''}</div>
      </button>`;
    }).join("");
    bodyHTML=`<div class="aeview-pick-label">Select your name</div>${list}`;
  } else {
    const ae=selectedAEObj;
    const dealBlocks=(ae?.deals||[]).map(deal=>{
      const isOpen=aeViewOpenDeal===deal.id;
      const subs=(deal.submissions||[]);
      const subsHTML=isOpen?(subs.length===0
        ?`<div class="aeview-no-subs">No ideas submitted yet — check back later.</div>`
        :subs.map(s=>`<div class="aeview-sub">
          <div class="aeview-sub-text">${esc(s.text)}</div>
          <div class="aeview-sub-meta">— ${esc(s.author||'Anonymous')} · ${fmt(s.ts)}</div>
        </div>`).join("")):'';
      return `<div class="aeview-deal">
        <div class="aeview-deal-header${isOpen?' open':''}" data-dealid="${deal.id}">
          <div>
            <div class="aeview-deal-name">${esc(deal.name)}</div>
            <div class="aeview-deal-tags">
              ${deal.arr?`<span class="deal-tag tag-arr">ARR: ${esc(deal.arr)}</span>`:''}
              ${deal.closeQ?`<span class="deal-tag tag-close">Close: ${esc(deal.closeQ)}</span>`:''}
            </div>
          </div>
          <div class="aeview-deal-right">
            <span class="aeview-deal-count">${subs.length} idea${subs.length!==1?'s':''}</span>
            <span class="aeview-deal-chevron">▼</span>
          </div>
        </div>
        ${isOpen?`<div class="aeview-deal-subs">${subsHTML}</div>`:''}
      </div>`;
    }).join("");

    bodyHTML=`
      <button class="aeview-back" id="aeview-back-btn">← Back to AE list</button>
      <div class="aeview-ae-banner">
        <div class="aeview-ae-label">Your Deals & Ideas</div>
        <div class="aeview-ae-name">${esc(ae?.name||'')}</div>
      </div>
      ${(ae?.deals||[]).length===0
        ?`<div class="aeview-no-deals">No deals added yet for you. Check back once the session starts.</div>`
        :`<div style="font-size:11px;color:#8888AA;margin-bottom:14px;letter-spacing:1px;">TAP A DEAL TO SEE SUBMITTED IDEAS</div>${dealBlocks}`}`;
  }

  app.innerHTML=`
  <div id="aeview">
    <div class="aeview-topbar">
      <div><div class="aeview-topbar-title">The Deals That Make It All Just Happen</div>
      <div class="aeview-topbar-sub">My Deals · Mile High Focus · Denver HBR</div></div>
      <div class="aud-topbar-brand" style="color:#FF4D8D">BASWARE</div>
    </div>
    <div class="aeview-body">${bodyHTML}</div>
  </div>`;

  document.querySelectorAll(".aeview-ae-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{ aeViewSelected=decodeURIComponent(btn.dataset.ae); aeViewOpenDeal=null; renderAEView(); });
  });
  document.getElementById("aeview-back-btn")?.addEventListener("click",()=>{ aeViewSelected=null; aeViewOpenDeal=null; renderAEView(); });
  document.querySelectorAll(".aeview-deal-header").forEach(el=>{
    el.addEventListener("click",()=>{
      const id=el.dataset.dealid;
      aeViewOpenDeal=aeViewOpenDeal===id?null:id;
      renderAEView();
    });
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function enc(str){ return encodeURIComponent(str||''); }
function fmt(ts){ return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function lastName(name){ const p=name.trim().split(' '); return p[p.length-1]; }
</script>
